<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script>
    try { var t=localStorage.getItem("nl-theme"); if(t) document.documentElement.dataset.theme=t; } catch(e){}
  </script>
  <style>
    :root {
      --bg:       #F8F7F4;
      --surface:  #F8F7F4;
      --lead-bg:  #EDEDFF;
      --ink:      #131311;
      --ink2:     #3D3D3B;
      --ink3:     #8A8782;
      --accent:   #4B6BFB;
      --border:   #E0DED8;
      --tag-bg:   #EAECFF;
      --tag-txt:  #3B5BDB;
      --shadow:   0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      --serif:    'Merriweather', Georgia, serif;
      --sans:     'Inter', system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg:       #0E0D0C;
      --surface:  #1A1917;
      --lead-bg:  #10112A;
      --ink:      #EDEAE0;
      --ink2:     #C4C1BC;
      --ink3:     #6A6864;
      --accent:   #8097FF;
      --border:   #232220;
      --tag-bg:   #141628;
      --tag-txt:  #99AAFF;
      --shadow:   0 1px 3px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    ::selection { background: var(--accent); color: #fff; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    body {
      background: var(--lead-bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    /* ── wrap ── */
    .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 28px 96px; }
    .content-grid {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      align-items: start;
      gap: 32px;
    }
    .news-col { min-width: 0; }

    /* ── masthead ── */
    .mast {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .mast-left { min-width: 0; }
    .mast-kicker {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
    }
    .mast-kicker-accent { color: var(--accent); font-weight: 600; }
    .mast-title {
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--tag-txt);
      border-radius: 4px;
      padding: 3px 9px;
    }
    .mast-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      padding-top: 4px;
    }
    .theme-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--ink2);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.1s, border-color 0.1s;
    }
    .theme-btn:hover { color: var(--ink); border-color: var(--ink3); }
    .mast-sub {
      font-size: 11px;
      color: var(--ink3);
      text-align: right;
    }

    /* ── LEAD STORY ── */
    .lead {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 32px 26px;
      margin-bottom: 36px;
      box-shadow: var(--shadow);
    }
    .lead-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .lead-label {
      color: var(--ink3);
      font-weight: 500;
    }
    .lead-img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      margin-bottom: 18px;
    }
    .lead-headline {
      font-family: var(--serif);
      font-size: clamp(24px, 3.6vw, 42px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .lead-summary {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.8;
      color: var(--ink2);
      margin-bottom: 18px;
      font-weight: 400;
    }
    .lead-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .story-sources { display: flex; gap: 12px; flex-wrap: wrap; }
    .source-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .source-link::after { content: " ↗"; opacity: 0.6; font-size: 10px; }
    .source-link:hover { text-decoration: underline; }
    .readtime {
      font-size: 11px;
      color: var(--ink3);
      white-space: nowrap;
    }

    /* ── SEC GRID (stories 2-3) ── */
    .sec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .sec-col {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px;
      box-shadow: var(--shadow);
    }
    .sec-grid {
      gap: 16px;
    }
    .sec-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
    }
    .sec-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin-bottom: 14px;
    }
    .sec-headline {
      font-family: var(--serif);
      font-size: clamp(18px, 2.2vw, 24px);
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .sec-summary {
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--ink2);
      margin-bottom: 14px;
    }
    .sec-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── STRIPS (stories 4+) ── */
    .strip {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 28px;
      background: var(--surface);
      border-radius: 14px;
      margin-top: 20px;
      box-shadow: var(--shadow);
    }
    .strip-text { flex: 1; min-width: 0; }
    .strip-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 8px;
    }
    .strip-headline {
      font-family: var(--serif);
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .strip-summary {
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--ink2);
      margin-bottom: 10px;
    }
    .strip-img {
      width: 150px;
      height: 110px;
      object-fit: cover;
      border-radius: 7px;
      flex-shrink: 0;
      display: block;
    }

    /* ── empty ── */
    .empty {
      padding: 80px 0;
      text-align: center;
      color: var(--ink3);
    }
    .empty-hed {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 700;
      color: var(--ink2);
      margin-bottom: 8px;
    }

    .extras {
      min-width: 0;
    }
    .extras-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .extras-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .extras-section + .extras-section { margin-top: 24px; }
    .extra-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .extras-kicker {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
    }
    .extra-body { min-width: 0; }
    .extra-link {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.25;
      text-decoration: none;
      font-weight: 600;
    }
    .extra-link:hover { text-decoration: underline; }
    .extra-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 9px;
      display: block;
      background: var(--lead-bg);
      flex-shrink: 0;
    }
    .extra-desc {
      color: var(--ink2);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 4px;
    }
    .extra-meta {
      color: var(--ink3);
      font-size: 11px;
      margin-top: 4px;
    }

    @media (max-width: 960px) {
      .wrap { max-width: 800px; }
      .content-grid { grid-template-columns: 1fr; }
      .extras { order: 2; margin-top: 32px; }
      .news-col { order: 1; }
      .extras-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    }

    @media (max-width: 560px) {
      .wrap { padding: 28px 16px 64px; }
      .lead { padding: 24px 22px 22px; }
      .sec-grid { grid-template-columns: 1fr; }
      .extras-grid { grid-template-columns: 1fr; }
      .mast { flex-direction: column; gap: 12px; }
      .mast-right { flex-direction: row; align-items: center; }
      .mast-sub { text-align: left; }
      .strip-img { width: 100px; height: 72px; }
    }

    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>
<body>

  <header class="mast">

      <div class="tags" id="tags"></div>

  <div class="content-grid">
    <aside class="extras" id="extras" aria-label="Extras"></aside>
    <main class="news-col" id="main" aria-label="Today's stories"></main>
  </div>

</div>

<script id="ed" type="application/json">{"date": "2026-06-15", "persona": "AI Engineer", "email": "prudvi@trufides.com", "issue_title": "Gateways, Graphs, and Agent UIs", "tags": ["LLM TOOLING", "MODEL ROUTING", "AGENTS", "AI SECURITY"], "stories": [{"number": "01", "headline": "LiteLLM turns into today’s production wake-up call", "summary": "TheHackerNews reports a vulnerability chain in LiteLLM that could let a low-privilege user compromise AI gateway servers. If you run LiteLLM as the proxy for model keys, provider routing, budgets, or tenant access, this is sitting directly on the blast-radius boundary. It caught my attention because LLM gateways are becoming production control planes, and their auth model now deserves the same scrutiny as API gateways.", "sources": [{"name": "TheHackerNews", "url": "https://thehackernews.com/2026/06/litellm-vulnerability-chain-lets-low.html", "topic": "AI LLM Tooling"}], "image": {"url": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjiH9LcMRhk5Li59rG05yXoOOofNzGpeG1MMSKQqhFCGW_28n0SjLKd9D4MC68N7jPP6dF2h2l8gW1OE7Y7akY2fckld2w1UKa3itsrCKeDjo_2vgzuvL3HxZpJ5naBx5LgPdjxhekaFONzBtR9SoJw-ugGVXOuceLQQPvJzcj7SSCgbRsqurOgnIgZppo/s1600/litellm.jpg", "alt": "LiteLLM security illustration"}, "label": "LEAD STORY", "read_time": "2 min read", "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "02", "headline": "Model routing is becoming the new app layer", "summary": "OpenRouter Fusion has builders treating multi-model synthesis as its own optimization surface, not just a fallback strategy. OrcaRouter’s response is a YAML-controlled graph where a prompt fans out to a panel and then a judge/synthesizer returns the answer, which is the kind of task-specific routing layer I’d actually benchmark in production.", "sources": [{"name": "X", "url": "https://x.com/jerryjliu0/status/2066363868683866503", "topic": "AI LLM Tooling"}, {"name": "X", "url": "https://x.com/OrcaRouter/status/2066536847636144301", "topic": "AI LLM Tooling"}, {"name": "X", "url": "https://x.com/viipin8/status/2066544661322482041", "topic": "AI Agents & Agentic Frameworks"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI LLM Tooling", "AI Agents & Agentic Frameworks"], "topic": "AI LLM Tooling"}, {"number": "06", "headline": "Agent identity is becoming its own infrastructure category", "summary": "NewCore emerged with $66M around a concrete operational problem: giving AI agents identities as they start behaving more like employees. That layer is easy to dismiss until agents touch internal APIs, SaaS apps, and secrets, where identity, scope, audit, and revocation become the whole game.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/15/ai-agents-are-becoming-employees-newcore-emerges-with-66m-to-give-them-identities/", "topic": "AI Agents & Agentic Frameworks"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/newcore-founders.jpg?resize=1200,800", "alt": "NewCore founding team"}, "label": null, "read_time": null, "topics": ["AI Agents & Agentic Frameworks"], "topic": "AI Agents & Agentic Frameworks"}, {"number": "05", "headline": "GLM-5.2 gives code agents a 1M-context challenger", "summary": "GLM-5.2 is rolling out to coding-plan users with a 1M-token context window, and the API is expected this week. ZCode 3.0 says it has been tuned around the model for stronger agent execution, long-context coding, and a Goal mode for larger dev tasks, making this one to test against the usual Claude/Codex loops.", "sources": [{"name": "X", "url": "https://x.com/ZaiforStartups/status/2066406863877636495", "topic": "Frontier Labs"}, {"name": "X", "url": "https://x.com/zcode_ai/status/2066236605917188228", "topic": "AI Coding Tools"}], "image": {"url": "https://pbs.twimg.com/media/HKy_OdsbQAAfnZu.jpg", "alt": "ZCode GLM-5.2 announcement graphic"}, "label": null, "read_time": null, "topics": ["Frontier Labs", "AI Coding Tools"], "topic": "Frontier Labs"}, {"number": "09", "headline": "OpenAI is building its services channel like a cloud platform", "summary": "OpenAI is putting $150M behind a partner network meant to help firms build, sell, and deploy OpenAI-based solutions, with a stated goal of 300,000 certified consultants by the end of 2026. Not deep tech, but it matters because model vendors are turning into platform ecosystems where the services layer may decide what gets adopted.", "sources": [{"name": "X", "url": "https://x.com/TheRealAdamG/status/2066503730480943302", "topic": "Frontier Labs"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "12", "headline": "Anthropic model access becomes a security-policy fight", "summary": "Cybersecurity veterans are protesting a U.S. government restriction on Anthropic’s most powerful models, arguing that defensive teams may need top-tier models rather than weaker substitutes. The interesting part is the policy/ops tension: model access controls intended to reduce risk can also slow the people using frontier models for security work.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/15/cybersecurity-vets-protest-dangerous-us-government-ban-on-anthropics-most-powerful-models/", "topic": "Frontier Labs"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/claude-mythos-logo.jpg?resize=1200,800", "alt": "Claude model logo graphic"}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "07", "headline": "Voice-agent stacks get new streaming ears and speech", "summary": "Krandiash says the company released Sonic-3.5 for streaming text-to-speech and Ink-2 for streaming speech-to-text, aimed directly at voice agents. If the latency and quality claims hold, this is meaningful because voice agents are less about the LLM alone and more about the full turn-taking pipeline.", "sources": [{"name": "X", "url": "https://x.com/krandiash/status/2066559212533190917", "topic": "Multimodal AI"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["Multimodal AI"], "topic": "Multimodal AI"}, {"number": "11", "headline": "Mistral may be raising frontier-lab-scale capital", "summary": "Mistral is reportedly in talks to raise $3.5B at a $23B valuation, which would give Europe’s flagship AI lab a lot more room to compete on models and distribution. It’s finance news, but I’m including it because frontier-model competition is still one of the biggest practical levers on API price, latency, and vendor risk.", "sources": [{"name": "X", "url": "https://x.com/exec_sum/status/2066544520981053632", "topic": "AI Startups & Open Source"}], "image": {"url": "https://pbs.twimg.com/media/HK3XQB2bIAAiGy_.jpg", "alt": "Mistral funding valuation graphic"}, "label": null, "read_time": null, "topics": ["AI Startups & Open Source"], "topic": "AI Startups & Open Source"}, {"number": "08", "headline": "AMD buys memory tech for the AI bottleneck nobody can ignore", "summary": "AMD acquired MEXT to add memory optimization tech to its data-center platform, with an emphasis on expanding usable memory and lowering infrastructure cost. The Wall Street read is that MEXT can make flash behave more like DRAM, and that’s exactly the kind of memory-tiering trick AI serving teams will keep chasing.", "sources": [{"name": "X", "url": "https://x.com/AMD/status/2066510056959418820", "topic": "AI Infra / Inference / Hardware"}, {"name": "X", "url": "https://x.com/wallstengine/status/2066568936410484943", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://pbs.twimg.com/media/HK237c_WgAEpLnV.jpg", "alt": "AMD MEXT acquisition announcement"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "04", "headline": "Copilot security is now enterprise app security", "summary": "TheHackerNews reported a one-click Microsoft 365 Copilot issue that could expose emails, files, and MFA codes. The technical takeaway for me is that copilots plugged into enterprise context need threat models for prompt-to-permission paths, not just model safety reviews.", "sources": [{"name": "TheHackerNews", "url": "https://thehackernews.com/2026/06/one-click-microsoft-365-copilot-flaw.html", "topic": "AI Products"}], "image": {"url": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgH3B8zgsVZmHEyLi8McE-eOrGvwf6Uh3zyqWrttvaEddXJCot7sybI1o-Ly5Q1TtuEJx9BzXol3oaXSFdzFif_5fg0TE3bFA7cuuNewVB2QiZC9HuWNsVDLZlpANK_qnbk_DfBgO1fRgpUbYbc_dL60zHQFxxFN4DgYDVI-D1LsA-8dkcVKpNjAStg9b4/s1600/ms365.jpg", "alt": "Microsoft 365 Copilot security graphic"}, "label": null, "read_time": null, "topics": ["AI Products"], "topic": "AI Products"}, {"number": "10", "headline": "Salesforce buys Fin to own support agents end to end", "summary": "Salesforce is buying Fin for $3.6B, a clear move to fold AI customer-service agents deeper into the CRM workflow. I care less about the M&A headline than the integration point: support agents get much more useful when they sit next to customer data, permissions, and action APIs.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/15/salesforce-acquires-ai-customer-service-platform-fin-for-3-6b/", "topic": "AI Products"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2024/06/GettyImages-1125951338.jpg?resize=1200,900", "alt": "Salesforce office building"}, "label": null, "read_time": null, "topics": ["AI Products"], "topic": "AI Products"}, {"number": "03", "headline": "Agent interfaces are moving beyond chat logs", "summary": "Two separate drops point in the same direction: agents should render useful UI while they work, not dump everything into chat. AI SDK’s experimental HarnessAgent/json-render demo covers charts, forms, and 3D in a sandbox, while the AWS scaffold ties Strands AgentCore, AG-UI streaming, CopilotKit, infra, and auth into a one-command starter.", "sources": [{"name": "X", "url": "https://x.com/ctatedev/status/2066555279295008908", "topic": "AI UX"}, {"name": "X", "url": "https://x.com/ataiiam/status/2066177321774792987", "topic": "AI Agents & Agentic Frameworks"}], "image": {"url": "https://pbs.twimg.com/media/HKyJUv8bcAACTEW.jpg", "alt": "AWS AG-UI app scaffold screenshot"}, "label": null, "read_time": null, "topics": ["AI UX", "AI Agents & Agentic Frameworks"], "topic": "AI UX"}], "extras": {"product_hunt": [{"rank": 1, "name": "Slashy", "tagline": "The AI assistant that does email for you", "url": "https://www.producthunt.com/products/slashy-3?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 446, "comments_count": 117, "image_url": "https://ph-files.imgix.net/aa3daced-0112-40c9-8dc8-ebc708ca30d3.png?auto=format"}, {"rank": 2, "name": "Taste Lab", "tagline": "Extract any website's design DNA", "url": "https://www.producthunt.com/products/taste-lab?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 362, "comments_count": 26, "image_url": "https://ph-files.imgix.net/9993bd80-1673-4915-baf9-40e87d20df11.png?auto=format"}, {"rank": 3, "name": "Permute 4.0", "tagline": "The ultimate media converter for macOS", "url": "https://www.producthunt.com/products/permute?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 210, "comments_count": 8, "image_url": "https://ph-files.imgix.net/63f198a0-e911-479c-8baf-5c36a498a8b1.png?auto=format"}], "github_trending": [{"rank": 1, "name": "iptv-org/iptv", "description": "Collection of publicly available IPTV channels from all over the world", "url": "https://github.com/iptv-org/iptv", "image_url": "https://opengraph.githubassets.com/1/iptv-org/iptv", "language": "TypeScript", "stars": "122,671", "stars_today": "2,650 stars today"}, {"rank": 2, "name": "teslamate-org/teslamate", "description": "A self-hosted data logger for your Tesla 🚘 [main maintainer=@JakobLichterfeld]", "url": "https://github.com/teslamate-org/teslamate", "image_url": "https://opengraph.githubassets.com/1/teslamate-org/teslamate", "language": "Elixir", "stars": "8,194", "stars_today": "35 stars today"}, {"rank": 3, "name": "Panniantong/Agent-Reach", "description": "Give your AI agent eyes to see the entire internet. Read & search Twitter, Reddit, YouTube, GitHub, Bilibili, XiaoHongShu — one CLI, zero API fees.", "url": "https://github.com/Panniantong/Agent-Reach", "image_url": "https://opengraph.githubassets.com/1/Panniantong/Agent-Reach", "language": "Python", "stars": "29,879", "stars_today": "1,045 stars today"}]}, "preview_bg": {"light": "#FFF6EC", "dark": "#2A1E0E"}}</script>
<script>
(function () {
  var ed = JSON.parse(document.getElementById("ed").textContent);
  var stories = ed.stories || [];
  var extras = ed.extras || {};

  /* masthead */
  var kickerEl = document.getElementById("mast-kicker");
  if (ed.persona) {
    kickerEl.innerHTML = (ed.date || "") + ' &middot; <span class="mast-kicker-accent">' + ed.persona + '</span>';
  } else {
    kickerEl.textContent = ed.date || "";
  }
  document.getElementById("mast-title").textContent = ed.issue_title || (stories.length + " stories");
  var subEl = document.getElementById("mast-sub");
  subEl.textContent = ed.email || "";

  var tagsEl = document.getElementById("tags");
  (ed.tags || []).forEach(function (t) {
    var s = document.createElement("span");
    s.className = "tag"; s.textContent = t;
    tagsEl.appendChild(s);
  });

  /* helpers */
  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }
  function makeImg(url, alt, cls) {
    var img = document.createElement("img");
    img.className = cls; img.src = url;
    img.alt = alt || ""; img.loading = "lazy";
    img.onerror = function () { this.remove(); };
    return img;
  }
  function makeSources(story, wrapCls) {
    var wrap = el("span", wrapCls || "story-sources");
    (story.sources || []).forEach(function (src) {
      if (!src.name) return;
      var a = el("a", "source-link", src.name);
      a.href = src.url || "#"; a.target = "_blank"; a.rel = "noopener noreferrer";
      wrap.appendChild(a);
    });
    return wrap;
  }
  function topicText(story) {
    return (story.topics || []).join(" · ") || story.topic || "";
  }

  var main = document.getElementById("main");

  function applyBg() {
    var previewBg = ed.preview_bg || {};
    var theme = document.documentElement.dataset.theme ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.body.style.background = previewBg[theme] || "var(--lead-bg)";
  }
  applyBg();

  if (!stories.length) {
    var empty = el("div", "empty");
    empty.innerHTML = '<p class="empty-hed">Nothing today</p><p>No stories matched your topics.</p>';
    main.appendChild(empty);
  }

  /* ── LEAD ── */
  if (stories.length) {
    var lead = stories[0];
    var leadEl = el("section", "lead");

    var eyebrow = el("p", "lead-eyebrow");
    eyebrow.appendChild(document.createTextNode(topicText(lead)));
    if (lead.label) eyebrow.appendChild(el("span", "lead-label", " · " + lead.label));
    leadEl.appendChild(eyebrow);

    var imgUrl = lead.image && lead.image.url;
    if (imgUrl) leadEl.appendChild(makeImg(imgUrl, lead.image.alt || lead.headline, "lead-img"));

    leadEl.appendChild(el("h2", "lead-headline", lead.headline));
    if (lead.summary) leadEl.appendChild(el("p", "lead-summary", lead.summary));

    var leadFoot = el("div", "lead-footer");
    leadFoot.appendChild(makeSources(lead));
    if (lead.read_time) leadFoot.appendChild(el("span", "readtime", lead.read_time));
    leadEl.appendChild(leadFoot);
    main.appendChild(leadEl);
  }

  /* ── SEC GRID (stories 1 & 2) ── */
  var secStories = stories.slice(1, 3);
  if (secStories.length) {
    var grid = el("div", "sec-grid");
    secStories.forEach(function (story) {
      var col = el("article", "sec-col");
      col.appendChild(el("p", "sec-eyebrow", topicText(story)));
      var sImg = story.image && story.image.url;
      if (sImg) col.appendChild(makeImg(sImg, story.image.alt || story.headline, "sec-img"));
      col.appendChild(el("h3", "sec-headline", story.headline));
      if (story.summary) col.appendChild(el("p", "sec-summary", story.summary));
      var foot = el("div", "sec-footer");
      foot.appendChild(makeSources(story));
      if (story.read_time) foot.appendChild(el("span", "readtime", story.read_time));
      col.appendChild(foot);
      grid.appendChild(col);
    });
    main.appendChild(grid);
  }

  /* ── STRIPS (stories 3+) ── */
  stories.slice(3).forEach(function (story) {
    var strip = el("article", "strip");
    var text = el("div", "strip-text");
    text.appendChild(el("p", "strip-eyebrow", topicText(story)));
    text.appendChild(el("h3", "strip-headline", story.headline));
    if (story.summary) text.appendChild(el("p", "strip-summary", story.summary));
    var foot = el("div", "story-sources");
    foot.style.display = "flex"; foot.style.gap = "12px";
    foot.style.flexWrap = "wrap"; foot.style.alignItems = "center";
    foot.appendChild(makeSources(story));
    if (story.read_time) foot.appendChild(el("span", "readtime", story.read_time));
    text.appendChild(foot);
    strip.appendChild(text);
    var sImg = story.image && story.image.url;
    if (sImg) strip.appendChild(makeImg(sImg, story.image.alt || story.headline, "strip-img"));
    main.appendChild(strip);
  });

  /* ── extras ── */
  function appendExtraSection(parent, title, items, type) {
    var section = el("section", "extras-section");
    section.appendChild(el("p", "extras-kicker", title));
    var grid = el("div", "extras-grid");
    (items || []).forEach(function (item) {
      var card = el("article", "extra-card");
      if (item.image_url) card.appendChild(makeImg(item.image_url, item.name || "", "extra-img"));
      var body = el("div", "extra-body");
      var a = el("a", "extra-link", "#" + item.rank + " " + item.name);
      a.href = item.url || "#"; a.target = "_blank"; a.rel = "noopener noreferrer";
      body.appendChild(a);
      var desc = item.tagline || item.description;
      if (desc) body.appendChild(el("p", "extra-desc", desc));
      var meta = type === "product"
        ? ((item.votes_count || 0) + " votes" + (item.comments_count ? " · " + item.comments_count + " comments" : ""))
        : ([item.language, item.stars_today].filter(Boolean).join(" · "));
      if (meta) body.appendChild(el("p", "extra-meta", meta));
      card.appendChild(body);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    parent.appendChild(section);
  }
  var extrasEl = document.getElementById("extras");
  var products = extras.product_hunt || [];
  var repos = extras.github_trending || [];
  if (products.length || repos.length) {
    extrasEl.appendChild(el("h2", "extras-title", "Extras"));
    if (products.length) appendExtraSection(extrasEl, "Product Hunt Yesterday Top 3", products, "product");
    if (repos.length) appendExtraSection(extrasEl, "GitHub Trending Top 3", repos, "repo");
  } else {
    extrasEl.remove();
  }

  /* ── theme ── */
  var btn = document.getElementById("theme-btn");
  function getTheme() {
    return document.documentElement.dataset.theme ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  }
  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    btn.textContent = t === "dark" ? "Light" : "Dark";
    try { localStorage.setItem("nl-theme", t); } catch(e) {}
    applyBg();
  }
  applyTheme(getTheme());
  btn.addEventListener("click", function () { applyTheme(getTheme() === "dark" ? "light" : "dark"); });
}());
</script>
</body>
</html>
