<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script>try{var t=localStorage.getItem("nl-theme");if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
  <style>
    :root {
      --bg:      #C9D8E2;
      --surface: rgba(238,244,246,0.78);
      --lead-bg: #9FB8C8;
      --ink:     #17212A;
      --ink2:    #35434D;
      --ink3:    #687681;
      --accent:  #315BA8;
      --border:  rgba(38,64,82,0.16);
      --tag-bg:  rgba(49,91,168,0.12);
      --tag-txt: #294F94;
      --hover:   rgba(247,250,251,0.88);
      --glow:    rgba(49,91,168,0.18);
      --surface-hi: rgba(255,255,255,0.46);
      --surface-lo: rgba(82,111,130,0.10);
      --shadow:  0 1px 1px rgba(255,255,255,0.65) inset, 0 1px 2px rgba(28,45,58,0.08), 0 18px 46px rgba(28,45,58,0.14), 0 0 0 1px rgba(255,255,255,0.20);
      --shadow-hover: 0 1px 1px rgba(255,255,255,0.74) inset, 0 24px 66px rgba(28,45,58,0.22), 0 0 34px var(--glow);
      --serif:   'Merriweather', Georgia, serif;
      --sans:    'Inter', system-ui, -apple-system, sans-serif;
      --r:       11px;
    }
    [data-theme="dark"] {
      --bg:      #0B1822;
      --surface: rgba(28,25,21,0.92);
      --lead-bg: #11133A;
      --ink:     #F4EDDF;
      --ink2:    #D0C5B4;
      --ink3:    #8B8377;
      --accent:  #91A4FF;
      --border:  rgba(218,200,166,0.13);
      --tag-bg:  rgba(75,107,251,0.16);
      --tag-txt: #AAB8FF;
      --hover:   rgba(255,255,255,0.055);
      --shadow:  0 1px 3px rgba(0,0,0,0.38), 0 18px 48px rgba(0,0,0,0.26);
      --shadow-hover: 0 22px 62px rgba(0,0,0,0.48);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--accent); color: #fff; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    body {
      background:
        radial-gradient(circle at 12% 0%, rgba(255,255,255,0.26), transparent 34vw),
        radial-gradient(circle at 92% 18%, rgba(49,91,168,0.13), transparent 32vw),
        var(--bg);
      background-attachment: fixed;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    /* ── layout ── */
    .wrap {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px clamp(20px, 3vw, 44px) 64px;
    }
    .content-grid {
      display: grid;
      grid-template-columns: minmax(250px, 300px) minmax(0,1fr);
      gap: 24px;
      align-items: start;
    }
    .news-col { min-width: 0; }
    .content-grid.no-extras { grid-template-columns: 1fr; }

    /* ── masthead ── */
    .mast {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background:
        linear-gradient(145deg, var(--surface-hi), transparent 38%),
        linear-gradient(325deg, var(--surface-lo), transparent 52%),
        linear-gradient(135deg, var(--surface), rgba(255,255,255,0.20));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      position: relative;
    }
    .mast-left { min-width: 0; padding-right: 76px; }
    .mast-kicker {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }
    .mast-kicker-accent { color: var(--accent); font-weight: 600; }
    .mast-title {
      font-family: var(--serif);
      font-size: clamp(32px, 4.4vw, 58px);
      font-weight: 700; line-height: 1.01;
      letter-spacing: -0.02em; color: var(--ink); margin-bottom: 10px;
    }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; background: var(--tag-bg);
      color: var(--tag-txt); border-radius: 999px; padding: 4px 10px;
    }
    .mast-right {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px; flex-shrink: 0;
    }
    .theme-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      color: var(--ink2); background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 11px; cursor: pointer;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .theme-btn:hover { color: var(--ink); background: var(--hover); border-color: var(--ink3); }
    /* ── LEAD CARD ── */
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.28fr) minmax(0, 0.92fr);
      gap: 14px;
      align-items: stretch;
      margin-bottom: 14px;
    }
    .side-stack {
      display: grid;
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 14px;
      min-width: 0;
    }
    .lead-card {
      border-radius: 22px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      display: flex;
      flex-direction: column;
      min-height: 360px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .lead-card:hover {
      background: var(--hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .lead-img {
      width: 100%; height: 210px; object-fit: cover; display: block;
      flex-shrink: 0;
      background: var(--lead-bg);
    }
    .lead-card.no-img .img-placeholder { display: flex; }
    .lead-body {
      padding: 14px 16px 16px;
      display: flex; flex-direction: column;
      flex: 1;
      min-width: 0;
    }
    .lead-meta {
      font-size: 10px; font-weight: 800; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 7px;
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .lead-readtime { color: var(--ink3); font-weight: 600; }
    .lead-readtime::before { content: "· "; color: var(--ink3); }
    .lead-headline {
      font-family: var(--serif);
      font-size: clamp(22px, 2.35vw, 32px);
      font-weight: 700; line-height: 1.08;
      letter-spacing: -0.03em; color: var(--ink);
    }

    /* ── CARD GRID (stories 4+) ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
      gap: 14px;
    }
    /* ── GRID HEADER ── */
    .grid-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 14px;
    }
    .grid-hdr-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink3);
      white-space: nowrap;
    }
    .grid-hdr-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .grid-hdr-count {
      font-size: 10px; font-weight: 600;
      color: var(--ink3); white-space: nowrap;
    }

    /* ── story teaser ── */
    .lead-teaser {
      font-size: 12.5px; line-height: 1.45; color: var(--ink2);
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .lead-sources {
      margin-top: 8px; font-size: 11px; color: var(--ink3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lead-source-link {
      color: var(--accent); font-weight: 600; text-decoration: none;
    }
    a.lead-source-link::after { content: " ↗"; opacity: 0.55; font-size: 9px; }
    a.lead-source-link:hover, a.lead-source-link:focus-visible { text-decoration: underline; }
    .card-topic {
      color: var(--accent); font-size: 9px; font-weight: 800;
      letter-spacing: 0.11em; text-transform: uppercase;
      margin-bottom: 7px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-summary {
      font-size: 12.5px; line-height: 1.48; color: var(--ink2);
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── CARDS ── */
    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }
    .news-card:hover {
      background: var(--hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .hero-grid .news-card { min-height: 0; }
    .side-stack .news-card { min-height: 158px; }
    .side-stack .card-img,
    .side-stack .img-placeholder,
    .side-stack .news-card.no-img .img-placeholder {
      height: 76px;
      min-height: 0;
    }
    .side-stack .card-text { padding: 8px 12px 10px; }
    .side-stack .card-topic { margin-bottom: 4px; }
    .side-stack .card-headline {
      font-size: 13.5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .side-stack .card-summary {
      display: -webkit-box;
      margin-top: 6px;
    }
    .news-card.no-img .img-placeholder { height: 156px; }
    .story-num {
      position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
      color: var(--tag-txt); background: var(--tag-bg);
      border: 1px solid var(--border); border-radius: 999px;
      padding: 3px 7px;
    }

    .card-img {
      width: 100%;
      height: 156px;
      object-fit: cover;
      display: block;
      background: var(--lead-bg);
    }
    .img-placeholder {
      width: 100%;
      height: 156px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 22% 20%, rgba(75,107,251,0.18), transparent 28%),
        linear-gradient(135deg, var(--tag-bg), var(--lead-bg));
      color: var(--tag-txt);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .lead-card .img-placeholder {
      width: 100%; height: 210px; min-height: 0; flex-shrink: 0;
    }

    .card-text {
      flex: 1;
      min-width: 0;
      padding: 14px 15px 15px;
      display: flex;
      flex-direction: column;
    }
    .card-headline {
      font-size: 14.5px; font-weight: 750;
      color: var(--ink); line-height: 1.25;
    }

    /* ── empty ── */
    .empty { padding: 48px 0; text-align: center; color: var(--ink3); }
    .empty-hed { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink2); margin-bottom: 5px; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: backdropIn 0.15s ease;
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%; max-width: 580px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: modalIn 0.18s ease;
    }
    [data-theme="dark"] .modal { box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .modal-close {
      position: sticky; top: 12px;
      float: right; margin: 12px 12px 0 0;
      width: 28px; height: 28px;
      background: var(--border); border: none; border-radius: 50%;
      color: var(--ink2); font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0; z-index: 1;
    }
    .modal-close:hover { background: var(--ink3); color: #fff; }

    .modal-img {
      width: 100%; max-height: 70vh; object-fit: contain; display: block;
      background: #000;
    }
    /* With an image, overlay the close button on top of the media. */
    .modal-has-img .modal-close { position: absolute; background: rgba(0,0,0,0.4); color: #fff; }
    .modal-has-img .modal-close:hover { background: rgba(0,0,0,0.7); }

    .modal-body { padding: 16px 20px 20px; }
    .modal-topic {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .modal-headline {
      font-family: var(--serif);
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em; color: var(--ink);
      margin-bottom: 12px;
    }
    .modal-summary {
      font-family: var(--serif);
      font-size: 14.5px; line-height: 1.85; color: var(--ink2);
    }
    .modal-footer {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 5px 10px;
      padding-top: 12px; border-top: 1px solid var(--border);
      margin-top: 14px;
    }
    .modal-sources { display: flex; gap: 7px; flex-wrap: wrap; flex: 1; }
    .source-link {
      font-size: 11px; font-weight: 600; color: var(--accent);
      text-decoration: none; white-space: nowrap;
    }
    a.source-link::after { content: " ↗"; opacity: 0.55; font-size: 9px; }
    a.source-link:hover, a.source-link:focus-visible { text-decoration: underline; }
    .readtime { font-size: 11px; color: var(--ink3); white-space: nowrap; }

    /* ── EXTRAS sidebar ── */
    .extras { min-width: 0; position: sticky; top: 18px; }
    .extras-title { font-family: var(--serif); font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .extras-grid { display: grid; grid-template-columns: 1fr; gap: 9px; }
    .extras-section + .extras-section { margin-top: 18px; }
    .extras-section-hdr {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 7px;
    }
    .extra-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px; display: flex; align-items: flex-start;
      gap: 9px; box-shadow: var(--shadow); color: inherit;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .extra-card:hover { background: var(--hover); }
    .extra-card:hover .extra-link, .extra-card:focus-visible .extra-link { text-decoration: underline; }
    .extras-kicker {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .extra-body { min-width: 0; }
    .extra-link {
      color: var(--ink); font-size: 12px; line-height: 1.3;
      text-decoration: none; font-weight: 600;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .extra-img {
      width: 46px; height: 46px; object-fit: cover;
      border-radius: 8px; display: block; background: var(--lead-bg); flex-shrink: 0;
    }
    .extra-desc {
      color: var(--ink2); font-size: 11px; line-height: 1.4; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .extra-meta {
      color: var(--ink3); font-size: 10.5px; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .extras-more {
      color: var(--accent); font-size: 11px;
      font-weight: 600; text-decoration: none; white-space: nowrap;
    }
    .extras-more::after { content: " ↗"; opacity: 0.6; font-size: 9px; }
    .extras-more:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .content-grid { grid-template-columns: 1fr; }
      .extras { order: 2; margin-top: 24px; position: static; }
      .news-col { order: 1; }
      .hero-grid { grid-template-columns: minmax(0, 1.28fr) minmax(0, 0.92fr); }
      .extras-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
    @media (max-width: 720px) {
      .hero-grid { grid-template-columns: 1fr; }
      .side-stack { grid-template-rows: auto; gap: 14px; }
      .side-stack .news-card { min-height: 0; }
      .side-stack .card-img,
      .side-stack .img-placeholder,
      .side-stack .news-card.no-img .img-placeholder { height: 156px; }
      .side-stack .card-text { padding: 14px 15px 15px; }
      .side-stack .card-summary { display: -webkit-box; }
    }
    @media (max-width: 540px) {
      .wrap { padding: 16px 13px 44px; }
      .mast {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        margin-bottom: 18px;
      }
      .mast-left { width: 100%; }
      .mast-right {
        top: 16px;
        right: 13px;
      }
      .hero-grid { grid-template-columns: 1fr; }
      .lead-card { grid-column: auto; flex-direction: column; min-height: 0; }
      .lead-img, .lead-card .img-placeholder, .lead-card.no-img .img-placeholder {
        width: 100%; height: 156px; min-height: 0;
      }
      .modal { max-height: 92vh; border-radius: 14px; }
      .extras-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, .modal, .modal-backdrop { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <div class="mast-left">
      <p class="mast-kicker" id="mast-kicker"></p>
      <h1 class="mast-title" id="mast-title"></h1>
      <div class="tags" id="tags"></div>
    </div>
    <div class="mast-right">
      <button class="theme-btn" id="theme-btn" type="button">Dark</button>
    </div>
  </header>

  <div class="content-grid" id="content-grid">
    <aside class="extras" id="extras" aria-label="Extras"></aside>
    <main class="news-col" id="main" aria-label="Today's stories"></main>
  </div>

</div>

bagent-heavy sessions, which makes it feel less like a coding assistant and more like an operating environment for software work.", "sources": [{"name": "X", "url": "https://x.com/gdb/status/2067700691062464887", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/testingcatalog/status/2067735439562191138", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/guinnesschen/status/2068062280345162047", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/lennysan/status/2067740880812052585", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/q_yeon_gyu_kim/status/2067865572139053297", "topic": "AI Coding Tools"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "03", "headline": "Copilot CLI now talks back and second-guesses", "summary": "GitHub says new Copilot CLI features are generally available: developers can speak to Copilot using on-device speech-to-text models, and a built-in Rubber Duck agent uses a second model to surface blind spots. The important bit for me is not the voice input itself, but the pattern: coding agents are starting to ship with native critique loops instead of leaving review discipline entirely to the human.", "sources": [{"name": "X", "url": "https://x.com/github/status/2068047020309283001", "topic": "AI Coding Tools"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "04", "headline": "Anthropic’s model ban became a frontier-lab stress test", "summary": "TechCrunch reports that the White House forced Anthropic to restrict Fable 5 and Mythos 5 after national security concerns involving Mythos access and alleged Fable safeguard bypasses, leaving the models unavailable while the company scrambled to comply. The episode matters because export controls are now colliding directly with frontier model release operations, customer access, cyber-defense use cases, and the trust layer labs need to run global developer ecosystems.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/19/encryption-spyware-and-now-mythos-history-shows-why-cyber-export-control-doesnt-work/", "topic": "Frontier Labs"}, {"name": "TechCrunch", "url": "https://techcrunch.com/video/is-the-us-governments-anthropic-ban-accidentally-helping-the-brand/", "topic": "Frontier Labs"}, {"name": "TechCrunch", "url": "https://techcrunch.com/podcast/the-us-banned-anthropics-fable-5-release-but-the-numbers-dont-seem-to-care/", "topic": "Frontier Labs"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/donald-trump-open-mouth.jpg?resize=1200,800", "alt": "Donald Trump speaking during an AI policy dispute"}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "05", "headline": "ASML’s EUV mystery hits the AI chip chokepoint", "summary": "U.S. officials are reportedly pressing ASML over concerns that EUV-related tools or components may have reached China, while ASML says no EUV machine has ever been shipped there. This is worth tracking because EUV lithography is one of the deepest bottlenecks behind Nvidia-class AI chips, and even partial leakage of know-how could shorten China’s path toward leading-edge semiconductor capacity.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/19/the-us-says-asmls-top-chip-tool-may-be-in-china-asml-says-it-isnt/", "topic": "AI Infra / Inference / Hardware"}, {"name": "X", "url": "https://x.com/kimmonismus/status/2067953411358671326", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/05/GettyImages-2250757778.jpg?resize=1200,800", "alt": "ASML semiconductor equipment facility"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "06", "headline": "Google published the TPU scaling receipts", "summary": "Jeff Dean pointed to a new IEEE Micro paper covering Google’s training supercomputers from TPU v2 through Ironwood, with claims including roughly 30x better TFLOPS per watt, 10x HBM capacity and bandwidth per node, and a jump from 256-chip TPU v2 pods to 9,216-chip Ironwood pods. For infra people, this is a useful rare look at how an accelerator architecture survived the transformer era while scaling power, resilience, interconnects, and pod size.", "sources": [{"name": "X", "url": "https://x.com/JeffDean/status/2067681662318924244", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://pbs.twimg.com/media/HLHggdRawAApUmQ.jpg", "alt": "Google TPU architecture paper preview"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "07", "headline": "Baseten’s valuation jump shows inference is still scorching", "summary": "Baseten is reportedly close to raising $1.5 billion at a headline valuation of $13 billion, only months after a $300 million Series E valued it at $5 billion. The detail I care about is that the inference layer is still being funded as a core control point for LLM apps: fast serving, cost control, model routing, and open-source fallback selection are becoming infrastructure moats.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/ai-inference-startup-baseten-reportedly-raising-1-5b-months-after-its-last-mega-round/", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2024/03/GettyImages-1502217391.jpg?resize=1200,800", "alt": "Data center hardware representing AI inference infrastructure"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "08", "headline": "Elastic buys into AI-native debugging", "summary": "Elastic has reportedly agreed to acquire Deductive AI for up to $85 million, bringing in a startup focused on using AI to catch and resolve software bugs. This fits the bigger devtools shift: as AI-written code volume rises, observability vendors need agents that can move from alert to root cause to remediation without making humans manually stitch the loop together.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/source-elastic-agrees-to-buy-crv-backed-deductiveai-for-up-to-85m/", "topic": "AI Coding Tools"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2018/03/gettyimages-824355868.jpg?resize=1200,760", "alt": "Elastic office signage"}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "09", "headline": "OpenAI adds research heft and policy cover", "summary": "OpenAI is bringing in Noam Shazeer, a co-author of the original Transformer paper and former Gemini lead, alongside Dean Ball, who will lead a new Strategic Futures policy team focused on catastrophic risk, recursive self-improvement, labor impact, and lab-government relations. The pairing is a clean read on OpenAI’s IPO-era priorities: keep frontier technical credibility high while building a much tighter policy interface than rivals facing government pressure.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/openai-is-bringing-on-some-big-guns-in-the-lead-up-to-its-ipo/", "topic": "Frontier Labs"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/noam-shazeer-deal-ball.png?resize=1200,800", "alt": "Noam Shazeer and Dean Ball pictured in an OpenAI hiring story"}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "10", "headline": "Chinese open models keep winning router traffic", "summary": "GLM 5.2 is getting notable developer attention, including an Amp plugin with zero data retention and U.S./Western inference, while a separate OpenRouter chart circulating today claims Chinese models have moved from about 1% to more than 50% of token consumption in under a year. I would not overfit to one chart or one model review, but the production signal is real: cheap, fast, good-enough models are reshaping routing decisions faster than brand-name frontier labs would like.", "sources": [{"name": "X", "url": "https://x.com/jeremyphoward/status/2067757468189679764", "topic": "AI LLM Tooling"}, {"name": "X", "url": "https://x.com/beyang/status/2068053105280008256", "topic": "AI LLM Tooling"}, {"name": "X", "url": "https://x.com/nicrypto/status/2067850223486140734", "topic": "AI LLM Tooling"}], "image": {"url": "https://pbs.twimg.com/media/HLJ6GjaaYAAxW4q.png", "alt": "Chart showing Chinese model token consumption on OpenRouter"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "11", "headline": "Reliance wants agents inside India’s phone network", "summary": "Reliance announced Jio Call Agent for its 500-million-user telecom network, plus AI tasking inside MyJio and an ambient home display called TeleFrame. The engineering angle is distribution: instead of another standalone assistant app, Jio is trying to make transcription, summarization, bookings, plan changes, and household reminders native to calls, apps, and connected devices.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/19/billionaire-ambani-wants-ai-in-every-call-app-and-home/", "topic": "AI Products"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/02/reliance-mukesh-ambani.jpg?resize=1200,800", "alt": "Mukesh Ambani at a Reliance event"}, "label": null, "read_time": null, "topics": ["AI Products"], "topic": "AI Products"}, {"number": "12", "headline": "Claude Code workflows are turning into agent swarms", "summary": "The Claude Code discourse today clustered around parallelism: one post says Anthropic engineers are running 100-plus agents with self-improving loops, another describes a Google Cloud developer splitting a build across API, pipeline, and dashboard agents, and a third shows Claude working through an Unreal Engine MCP server. The through-line is that serious users are moving from one chat window to planned, inspectable, multi-agent execution across tools.", "sources": [{"name": "X", "url": "https://x.com/RoundtableSpace/status/2067747938986856456", "topic": "AI Agents & Agentic Frameworks"}, {"name": "X", "url": "https://x.com/rewind02/status/2067970061243932752", "topic": "AI Agents & Agentic Frameworks"}, {"name": "X", "url": "https://x.com/beamnxw/status/2067935433871241584", "topic": "LLM OS / MCP Ecosystem"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Agents & Agentic Frameworks", "LLM OS / MCP Ecosystem"], "topic": "AI Agents & Agentic Frameworks"}, {"number": "13", "headline": "Depth Anything 3 gets the GGUF treatment", "summary": "Depth Anything 3 now reportedly runs as pure C++/ggml with a self-contained GGUF, avoiding Python, PyTorch, and the CUDA toolkit at inference time. That matters because the ggml/GGUF ecosystem is moving beyond text LLMs into useful vision primitives, making local multimodal pipelines easier to ship on constrained hardware.", "sources": [{"name": "X", "url": "https://x.com/mudler_it/status/2067973361745969238", "topic": "Multimodal AI"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["Multimodal AI"], "topic": "Multimodal AI"}, {"number": "14", "headline": "Cerebras tees up Gemma 4 multimodal access", "summary": "Cerebras is offering early access to Gemma 4 on its hardware and pairing it with a 24-hour hackathon backed by Google DeepMind and Cerebras. The claim to watch is speed: if Cerebras can make a new multimodal Gemma feel instant enough for builders, it becomes another serious option in the model-routing toolbox.", "sources": [{"name": "X", "url": "https://x.com/cerebras/status/2068051036225585611", "topic": "Multimodal AI"}], "image": {"url": "https://pbs.twimg.com/media/HLMxbjBaYAAyGhH.jpg", "alt": "Cerebras and Google DeepMind Gemma 4 hackathon announcement"}, "label": null, "read_time": null, "topics": ["Multimodal AI"], "topic": "Multimodal AI"}, {"number": "15", "headline": "Trio ships a developer layer for live physical operations", "summary": "IoTeX and MachineFi Lab introduced Trio, a world model for physical operations, with Trio-Retina available for developers via pip install and Trio-Lumen for operators who want to ask camera feeds questions in natural language. The interesting part is the product shape: turning video from warehouses, factories, and retail floors into structured scene state that agents can monitor, predict on, and eventually act against.", "sources": [{"name": "X", "url": "https://x.com/Raullen/status/2068053475355955664", "topic": "Multimodal AI"}], "image": {"url": "https://pbs.twimg.com/card_img/2068015098598436865/kUFpkgNA?format=png&name=800x419", "alt": "Trio world model for physical operations announcement"}, "label": null, "read_time": null, "topics": ["Multimodal AI"], "topic": "Multimodal AI"}, {"number": "16", "headline": "VLC’s builder is open-sourcing remote-control infrastructure", "summary": "Jean-Baptiste Kempf, best known for VLC, has raised $5 million for Kyber, an SDK for synchronizing video, audio, sensor data, and control inputs with minimal latency across remote devices. I like this because physical AI will need boring, robust plumbing for robots, drones, and fleets long before the high-level agents look magical.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/19/he-made-your-free-video-player-run-smoothly-now-hes-doing-that-for-robots/", "topic": "AI Startups & Open Source"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/GettyImages-2182705840.jpeg?resize=1200,800", "alt": "Robot hardware representing remote device control infrastructure"}, "label": null, "read_time": null, "topics": ["AI Startups & Open Source"], "topic": "AI Startups & Open Source"}, {"number": "17", "headline": "Snap moves costly AI video work outside the house", "summary": "Snap is spinning out its internal generative AI video team into Dotmo, a separate company focused on models for interactive gaming experiences, with CTO Bobby Murphy personally investing and Snap retaining equity and a technology license relationship. This is a useful market signal: even large consumer platforms are looking for ways to keep exposure to AI video upside without carrying all of the compute burn on the core P&L.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/snap-spins-off-ai-video-team-into-new-company-dotmo-due-to-costs/", "topic": "Multimodal AI"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/GettyImages-2281911508.jpg?resize=1200,856", "alt": "Snap office signage"}, "label": null, "read_time": null, "topics": ["Multimodal AI"], "topic": "Multimodal AI"}, {"number": "18", "headline": "Shadow AI has become an identity problem", "summary": "The Hacker News piece frames the next enterprise AI security issue less as employees pasting secrets into chatbots and more as unsanctioned agents connected to Salesforce, Snowflake, GitHub, Slack, MCP servers, browser extensions, and service accounts. That is the right mental model for production teams: agents are non-human actors with credentials, permissions, owners, lifecycles, and blast radius.", "sources": [{"name": "TheHackerNews", "url": "https://thehackernews.com/2026/06/forget-data-leakage-shadow-ais-real.html", "topic": "LLM OS / MCP Ecosystem"}], "image": {"url": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh6R48ZeaNtIzMVc6atNjuxbNYFUfiFCJ_cE1qE_85yGOOavsX0ijvQGdv9QZ2-4Lky8mTOPhrNIydUvLS2DtGkkFXYJFRTT99Vbb03s3Rtk9pTariHdQ2on2RGxiAsMQnySj7AJfxUtBxO1aJTupjkQvDvt5jp1klznY9_WHckqm64F-BbCtCR2UoJ968/s1600/tines-main.jpg", "alt": "Security illustration for shadow AI and access control"}, "label": null, "read_time": null, "topics": ["LLM OS / MCP Ecosystem"], "topic": "LLM OS / MCP Ecosystem"}, {"number": "19", "headline": "YC’s batch says agents need better sandboxes", "summary": "TechCrunch’s YC Demo Day roundup shows the Spring 2026 cohort leaning heavily into defense tech, robotics, AI infrastructure, developer tools, and agents, with some valuations reportedly pushing past $175 million. The startup I’d actually want to inspect is Arga Labs, which is building digital twin environments for testing AI agents before their code reaches production.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/the-11-standout-startups-from-ycs-demo-day-according-to-vcs/", "topic": "AI Startups & Open Source"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2022/09/yc-2022-fall-1-e1662566861873-copy.png?w=1000", "alt": "Y Combinator Demo Day branding"}, "label": null, "read_time": null, "topics": ["AI Startups & Open Source"], "topic": "AI Startups & Open Source"}, {"number": "20", "headline": "AI networking is not just copper versus optics", "summary": "SemiAnalysis argues that scaling GPU clusters should lift demand for both copper and optical interconnects, because they solve different reach, power, cost, reliability, and bandwidth constraints. The practical takeaway is simple: as model clusters grow, data movement becomes a first-order systems problem, not a single-component bet.", "sources": [{"name": "X", "url": "https://x.com/SemiAnalysis_/status/2068136869011861897", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://pbs.twimg.com/media/HLN_haZWQAAxAYT.jpg", "alt": "AI networking hardware comparison chart"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}], "extras": {"product_hunt": [{"rank": 1, "name": "Claude Code Artifacts", "tagline": "Previe _hunt_more_url": "https://www.producthunt.com/leaderboard/daily/2026/6/19", "github_trending": [{"rank": 1, "name": "DeusData/codebase-memory-mcp", "description": "High-performance code intelligence MCP server. Indexes codebases into a persistent knowledge graph — average repo in milliseconds. 158 languages, sub-ms queries, 99% fewer tokens. Single static binary, zero dependencies.", "url": "https://github.com/DeusData/codebase-memory-mcp", "image_url": "https://opengraph.githubassets.com/1/DeusData/codebase-memory-mcp", "language": "C", "stars": "8,409", "stars_today": "1,058 stars today"}, {"rank": 2, "name": "google-research/timesfm", "description": "TimesFM (Time Series Foundation Model) is a pretrained time-series foundation model developed by Google Research for time-series forecasting.", "url": "https://github.com/google-research/timesfm", "image_url": "https://opengraph.githubassets.com/1/google-research/timesfm", "language": "Python", "stars": "24,135", "stars_today": "1,510 stars today"}, {"rank": 3, "name": "palmier-io/palmier-pro", "description": "macOS video editor built for AI", "url": "https://github.com/palmier-io/palmier-pro", "image_url": "https://opengraph.githubassets.com/1/palmier-io/palmier-pro", "language": "Swift", "stars": "2,026", "stars_today": "756 stars today"}]}, "preview_bg": {"light": {"bg": "#C9D8E2", "surface": "rgba(238,244,246,0.78)", "lead-bg": "#9FB8C8", "ink": "#17212A", "ink2": "#35434D", "ink3": "#687681", "accent": "#315BA8", "border": "rgba(38,64,82,0.16)", "tag-bg": "rgba(49,91,168,0.12)", "tag-txt": "#294F94", "hover": "rgba(247,250,251,0.88)", "glow": "rgba(49,91,168,0.18)", "surface-hi": "rgba(255,255,255,0.46)", "surface-lo": "rgba(82,111,130,0.10)"}, "dark": "#0A1E2C"}}</script>
<script>
(function () {
  var ed      = JSON.parse(document.getElementById("ed").textContent);
  var stories = ed.stories || [];
  var extras  = ed.extras  || {};

  /* ── masthead ── */
  var kickerEl = document.getElementById("mast-kicker");
  if (ed.persona) {
    if (ed.date) kickerEl.appendChild(document.createTextNode(ed.date + " · "));
    var personaEl = document.createElement("span");
    personaEl.className = "mast-kicker-accent";
    personaEl.textContent = ed.persona;
    kickerEl.appendChild(personaEl);
  } else {
    kickerEl.textContent = ed.date || "";
  }
  document.title = ed.issue_title ? ed.issue_title + " — Newsletter Preview" : "Newsletter Preview";
  document.getElementById("mast-title").textContent = ed.issue_title || plural(stories.length, "story");
  (ed.tags||[]).forEach(function(t){
    var s = document.createElement("span"); s.className="tag"; s.textContent=t;
    document.getElementById("tags").appendChild(s);
  });

  /* ── helpers ── */
  function el(tag,cls,text){
    var n=document.createElement(tag);
    if(cls) n.className=cls;
    if(text!=null) n.textContent=text;
    return n;
  }
  function makeImg(url,alt,cls){
    var img=document.createElement("img");
    img.className=cls; img.src=url; img.alt=alt||""; img.loading="lazy";
    img.onerror=function(){this.remove();};
    return img;
  }
  function storyHeadline(story){
    return story.headline || "Untitled story";
  }
  function topicFull(story){
    return (story.topics||[]).join(" · ") || story.topic || "";
  }
  function plural(n,singular,pluralText){
    return n + " " + (n===1 ? singular : (pluralText || singular + "s"));
  }
  var summaryGrids = [];
  var balanceRaf = 0;
  function balanceCardSummaries(grid){
    var cards = Array.prototype.slice.call(grid.querySelectorAll(".news-card"));
    var leadCards = Array.prototype.slice.call(grid.querySelectorAll(".lead-card"));

    cards.forEach(function(card){
      var summary = card.querySelector(".card-summary");
      if(summary && getComputedStyle(summary).display !== "none") {
        summary.style.setProperty("-webkit-line-clamp", "4");
      }
    });
    leadCards.forEach(function(card){
      var teaser = card.querySelector(".lead-teaser");
      if(teaser && getComputedStyle(teaser).display !== "none") {
        teaser.style.setProperty("-webkit-line-clamp", "2");
      }
    });

    /* Force the baseline layout before giving each card its own clamp. */
    void grid.offsetHeight;

    cards.forEach(function(card){
      var summary = card.querySelector(".card-summary");
      var text    = card.querySelector(".card-text");
      if(!summary || !text) return;

      var summaryStyle = getComputedStyle(summary);
      if(summaryStyle.display === "none") return;

      var lineHeight = parseFloat(summaryStyle.lineHeight) || 18;
      var textRect = text.getBoundingClientRect();
      var summaryRect = summary.getBoundingClientRect();
      var available = textRect.bottom - summaryRect.top - 1;
      var maxLines = Math.max(1, Math.floor(available / lineHeight));

      summary.style.setProperty("-webkit-line-clamp", String(maxLines));
    });

    leadCards.forEach(function(card){
      var teaser = card.querySelector(".lead-teaser");
      var body = card.querySelector(".lead-body");
      if(!teaser || !body) return;

      var teaserStyle = getComputedStyle(teaser);
      if(teaserStyle.display === "none") return;

      var lineHeight = parseFloat(teaserStyle.lineHeight) || 18;
      var bodyRect = body.getBoundingClientRect();
      var teaserRect = teaser.getBoundingClientRect();
      var afterTeaser = 1;
      var sources = card.querySelector(".lead-sources");
      if(sources) {
        var sourcesStyle = getComputedStyle(sources);
        afterTeaser += sources.getBoundingClientRect().height;
        afterTeaser += parseFloat(sourcesStyle.marginTop) || 0;
        afterTeaser += parseFloat(sourcesStyle.marginBottom) || 0;
      }
      var available = bodyRect.bottom - teaserRect.top - afterTeaser;
      var maxLines = Math.max(1, Math.floor(available / lineHeight));

      teaser.style.setProperty("-webkit-line-clamp", String(maxLines));
    });
  }
  function addBalancedGrid(grid){
    summaryGrids.push(grid);
    scheduleBalanceCards();
  }
  function scheduleBalanceCards(){
    if(balanceRaf) return;
    balanceRaf = requestAnimationFrame(function(){
      balanceRaf = 0;
      summaryGrids.forEach(balanceCardSummaries);
    });
  }
  /* ── background ── */
  function applyBg(){
    var pb=ed.preview_bg||{};
    var theme=document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    var themed = pb[theme];
    ["bg", "surface", "lead-bg", "ink", "ink2", "ink3", "accent", "border", "tag-bg", "tag-txt", "hover", "glow", "surface-hi", "surface-lo"].forEach(function(name){
      document.documentElement.style.removeProperty("--" + name);
    });
    if(!themed) return;
    if(typeof themed === "string") {
      document.documentElement.style.setProperty("--bg", themed);
      return;
    }
    Object.keys(themed).forEach(function(name){
      document.documentElement.style.setProperty("--" + name, themed[name]);
    });
  }
  applyBg();
  window.addEventListener("resize", scheduleBalanceCards);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(scheduleBalanceCards);

  /* ── MODAL ── */
  function openModal(story){
    var existing = document.querySelector(".modal-backdrop");
    if(existing) return;

    var headline = storyHeadline(story);
    var hasImg = !!(story.image && story.image.url);
    var previousFocus = document.activeElement;
    var previousOverflow = document.body.style.overflow;

    var backdrop = el("div","modal-backdrop");
    var modal    = el("div","modal" + (hasImg?" modal-has-img":""));
    var headlineId = "modal-headline-" + Date.now();
    modal.setAttribute("role","dialog");
    modal.setAttribute("aria-modal","true");
    modal.setAttribute("aria-labelledby", headlineId);

    /* close button */
    var closeBtn = el("button","modal-close","×");
    closeBtn.setAttribute("aria-label","Close");
    modal.appendChild(closeBtn);

    /* image */
    if(hasImg){
      modal.appendChild(makeImg(story.image.url, story.image.alt||headline, "modal-img"));
    }

    /* body */
    var body = el("div","modal-body");

    var topicEl = el("p","modal-topic");
    topicEl.textContent = topicFull(story);
    if(story.label) topicEl.appendChild(el("span",null," · "+story.label));
    body.appendChild(topicEl);

    var heading = el("h2","modal-headline", headline);
    heading.id = headlineId;
    body.appendChild(heading);
    if(story.summary) body.appendChild(el("p","modal-summary", story.summary));

    /* footer: sources + readtime */
    var footer = el("div","modal-footer");
    var srcs   = el("span","modal-sources");
    (story.sources||[]).forEach(function(src){
      if(!src.name) return;
      if(src.url){
        var a = el("a","source-link",src.name);
        a.href=src.url; a.target="_blank"; a.rel="noopener noreferrer";
        srcs.appendChild(a);
      } else {
        srcs.appendChild(el("span","source-link",src.name));
      }
    });
    footer.appendChild(srcs);
    if(story.read_time) footer.appendChild(el("span","readtime",story.read_time));
    body.appendChild(footer);

    modal.appendChild(body);
    backdrop.appendChild(modal);
    document.body.appendChild(backdrop);
    document.body.style.overflow="hidden";

    function close(){
      if(!backdrop.parentNode) return;
      backdrop.style.animation="backdropIn 0.12s ease reverse";
      modal.style.animation="modalIn 0.12s ease reverse";
      setTimeout(function(){
        if(backdrop.parentNode) backdrop.remove();
        document.body.style.overflow=previousOverflow;
        if(previousFocus && typeof previousFocus.focus==="function") previousFocus.focus();
      }, 110);
      document.removeEventListener("keydown",onKey);
    }
    function onKey(e){
      if(e.key==="Escape"){
        e.preventDefault();
        close();
        return;
      }
      if(e.key!=="Tab") return;

      var focusable = Array.prototype.slice.call(modal.querySelectorAll('a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])'));
      if(!focusable.length) return;
      var first = focusable[0];
      var last = focusable[focusable.length-1];
      if(e.shiftKey && document.activeElement===first){
        e.preventDefault();
        last.focus();
      } else if(!e.shiftKey && document.activeElement===last){
        e.preventDefault();
        first.focus();
      }
    }

    closeBtn.addEventListener("click", close);
    backdrop.addEventListener("click", function(e){ if(e.target===backdrop) close(); });
    document.addEventListener("keydown", onKey);

    setTimeout(function(){ closeBtn.focus(); }, 50);
  }

  /* ── render ── */
  var main = document.getElementById("main");

  if(!stories.length){
    var empty=el("div","empty");
    empty.appendChild(el("p","empty-hed","Nothing today"));
    empty.appendChild(el("p",null,"No stories matched your topics."));
    main.appendChild(empty);
  }

  function makeStoryCard(story, number, options){
    options = options || {};
    var headline = storyHeadline(story);
    var imgUrl = story.image && story.image.url;
    var card = el("div", "news-card");
    card.setAttribute("role","button");
    card.setAttribute("tabindex","0");
    card.setAttribute("aria-label","Read: "+headline);

    if(number) card.appendChild(el("span","story-num",String(number).padStart(2,"0")));
    if(imgUrl){
      var img = makeImg(imgUrl, story.image.alt||headline, "card-img");
      img.onerror = function(){
        card.className += " no-img";
        if(options.omitImagePlaceholder) this.remove();
        else this.replaceWith(el("div","img-placeholder","No image"));
      };
      card.appendChild(img);
    } else {
      card.className += " no-img";
      if(!options.omitImagePlaceholder) card.appendChild(el("div","img-placeholder","No image"));
    }

    var text = el("div","card-text");
    var topic = topicFull(story);
    if(topic) text.appendChild(el("p","card-topic",topic));
    text.appendChild(el("p","card-headline", headline));
    if(story.summary) text.appendChild(el("p","card-summary", story.summary));
    card.appendChild(text);

    card.addEventListener("click", function(){ openModal(story); });
    card.addEventListener("keydown", function(e){
      if((e.key==="Enter"||e.key===" ") && !e.repeat){
        e.preventDefault();
        openModal(story);
      }
    });
    return card;
  }

  /* HERO GRID: lead spans two card spaces; stories 2 and 3 sit beside it. */
  if(stories.length){
    var heroGrid = el("div","hero-grid");
    var lead    = stories[0];
    var leadHeadline = storyHeadline(lead);
    var leadEl  = el("div","lead-card");
    leadEl.setAttribute("role","button");
    leadEl.setAttribute("tabindex","0");
    leadEl.setAttribute("aria-label","Read lead story: "+leadHeadline);

    var imgUrl = lead.image&&lead.image.url;
    if(imgUrl){
      var leadImg = makeImg(imgUrl, lead.image.alt||leadHeadline, "lead-img");
      leadImg.onerror = function(){ leadEl.className += " no-img"; this.remove(); };
      leadEl.appendChild(leadImg);
    } else {
      leadEl.className += " no-img";
    }

    var leadBody = el("div","lead-body");
    var leadMeta = el("p","lead-meta");
    leadMeta.appendChild(el("span",null,lead.label||"Lead story"));
    if(lead.read_time) leadMeta.appendChild(el("span","lead-readtime",lead.read_time));
    leadBody.appendChild(leadMeta);
    leadBody.appendChild(el("p","lead-headline", leadHeadline));
    if(lead.summary){
      leadBody.appendChild(el("p","lead-teaser", lead.summary));
    }
    if((lead.sources||[]).length){
      var leadSources = el("p","lead-sources");
      (lead.sources||[]).forEach(function(src){
        if(!src.name) return;
        if(leadSources.childNodes.length) leadSources.appendChild(document.createTextNode(", "));
        if(src.url){
          var a = el("a","lead-source-link",src.name);
          a.href=src.url; a.target="_blank"; a.rel="noopener noreferrer";
          a.addEventListener("click", function(e){ e.stopPropagation(); });
          leadSources.appendChild(a);
        } else {
          leadSources.appendChild(el("span","lead-source-link",src.name));
        }
      });
      if(leadSources.childNodes.length) leadBody.appendChild(leadSources);
    }

    leadEl.appendChild(leadBody);
    leadEl.addEventListener("click", function(){ openModal(lead); });
    leadEl.addEventListener("keydown", function(e){
      if((e.key==="Enter"||e.key===" ") && !e.repeat){
        e.preventDefault();
        openModal(lead);
      }
    });
    heroGrid.appendChild(leadEl);
    if(stories.length>1){
      var sideStack = el("div","side-stack");
      stories.slice(1,3).forEach(function(story, i){
        sideStack.appendChild(makeStoryCard(story, i + 2, { omitImagePlaceholder: true }));
      });
      heroGrid.appendChild(sideStack);
    }
    main.appendChild(heroGrid);
    addBalancedGrid(heroGrid);
  }

  /* CARD GRID (stories 4+) */
  if(stories.length>3){
    /* section header */
    var gHdr = el("div","grid-hdr");
    gHdr.appendChild(el("span","grid-hdr-label","More stories"));
    gHdr.appendChild(el("span","grid-hdr-line"));
    gHdr.appendChild(el("span","grid-hdr-count",plural(stories.length-3,"story")));
    main.appendChild(gHdr);

    var grid = el("div","card-grid");
    stories.slice(3).forEach(function(story, i){
      grid.appendChild(makeStoryCard(story, i + 4));
    });
    main.appendChild(grid);
    addBalancedGrid(grid);
  }

  /* ── EXTRAS ── */
  function appendExtraSection(parent,title,items,type,moreUrl){
    var section=el("section","extras-section");
    var header=el("div","extras-section-hdr");
    header.appendChild(el("p","extras-kicker",title));
    if(moreUrl){
      var more=el("a","extras-more","More");
      more.href=moreUrl; more.target="_blank"; more.rel="noopener noreferrer";
      header.appendChild(more);
    }
    section.appendChild(header);

    var grid=el("div","extras-grid");
    (items||[]).forEach(function(item){
      var card=el("a","extra-card");
      card.href=item.url||"#"; card.target="_blank"; card.rel="noopener noreferrer";
      var itemName = item.name || "Untitled";
      var itemRank = item.rank ? "#" + item.rank + " " : "";
      if(item.image_url) card.appendChild(makeImg(item.image_url,itemName,"extra-img"));
      var body=el("div","extra-body");
      body.appendChild(el("span","extra-link",itemRank+itemName));
      var desc=item.tagline||item.description;
      if(desc) body.appendChild(el("p","extra-desc",desc));
      var meta=type==="product"
        ?(plural(item.votes_count||0,"vote")+(item.comments_count?" · "+plural(item.comments_count,"comment"):""))
        :([item.language,item.stars_today].filter(Boolean).join(" · "));
      if(meta) body.appendChild(el("p","extra-meta",meta));
      card.appendChild(body);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    parent.appendChild(section);
  }

  var extrasEl = document.getElementById("extras");
  var products = extras.product_hunt   ||[];
  var repos    = extras.github_trending||[];
  if(products.length||repos.length){
    extrasEl.appendChild(el("h2","extras-title","Extras"));
    if(products.length) appendExtraSection(extrasEl,"Product Hunt Yesterday Top 5",products,"product",extras.product_hunt_more_url);
    if(repos.length)    appendExtraSection(extrasEl,"GitHub Trending Top 3",repos,"repo",extras.github_trending_more_url||"https://github.com/trending");
  } else {
    document.getElementById("content-grid").classList.add("no-extras");
    extrasEl.remove();
  }

  /* ── theme ── */
  var btn=document.getElementById("theme-btn");
  function getTheme(){
    return document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  }
  function applyTheme(t){
    document.documentElement.dataset.theme=t;
    btn.textContent=t==="dark"?"Light":"Dark";
    try{localStorage.setItem("nl-theme",t);}catch(e){}
    applyBg();
  }
  applyTheme(getTheme());
  btn.addEventListener("click",function(){applyTheme(getTheme()==="dark"?"light":"dark");});
}());
</script>
</body>
