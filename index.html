<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script>try{var t=localStorage.getItem("nl-theme");if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
  <style>
    :root {
      --bg:      #F8F7F4;
      --surface: #FFFFFF;
      --lead-bg: #AFA088;
      --ink:     #131311;
      --ink2:    #3D3D3B;
      --ink3:    #8A8782;
      --accent:  #4B6BFB;
      --border:  #BBAE98;
      --tag-bg:  #EAECFF;
      --tag-txt: #3B5BDB;
      --hover:   #F3F2EF;
      --shadow:  0 1px 2px rgba(36,28,18,0.10), 0 8px 24px rgba(36,28,18,0.10);
      --serif:   'Merriweather', Georgia, serif;
      --sans:    'Inter', system-ui, -apple-system, sans-serif;
      --r:       11px;
    }
    [data-theme="dark"] {
      --bg:      #0E0D0C;
      --surface: #1C1A18;
      --lead-bg: #10112A;
      --ink:     #EDEAE0;
      --ink2:    #C4C1BC;
      --ink3:    #6A6864;
      --accent:  #8097FF;
      --border:  #2A2825;
      --tag-bg:  #141628;
      --tag-txt: #99AAFF;
      --hover:   #222019;
      --shadow:  0 1px 3px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--accent); color: #fff; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    body {
      background: var(--lead-bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    /* ── layout ── */
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 18px 56px; }
    .content-grid {
      display: grid;
      grid-template-columns: 256px minmax(0,1fr);
      gap: 20px;
      align-items: start;
    }
    .news-col { min-width: 0; }

    /* ── masthead ── */
    .mast {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .mast-left { min-width: 0; }
    .mast-kicker {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }
    .mast-kicker-accent { color: var(--accent); font-weight: 600; }
    .mast-title {
      font-family: var(--serif);
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 700; line-height: 1.08;
      letter-spacing: -0.02em; color: var(--ink); margin-bottom: 10px;
    }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; background: var(--tag-bg);
      color: var(--tag-txt); border-radius: 4px; padding: 3px 8px;
    }
    .mast-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px; flex-shrink: 0;
    }
    .theme-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      color: var(--ink2); background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 11px; cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    .theme-btn:hover { color: var(--ink); border-color: var(--ink3); }
    .mast-sub { font-size: 11px; color: var(--ink3); text-align: right; }

    /* ── LEAD CARD ── */
    .lead-card {
      border-radius: var(--r);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid rgba(80,68,50,0.16);
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      display: flex;
      min-height: 150px;
    }
    .lead-img {
      width: 42%; min-height: 150px; object-fit: cover; display: block;
      flex-shrink: 0;
    }
    .lead-body {
      padding: 14px 16px;
      display: flex; flex-direction: column; justify-content: center;
      min-width: 0;
    }
    .lead-meta {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .lead-readtime { color: var(--ink3); font-weight: 600; }
    .lead-readtime::before { content: "· "; color: var(--ink3); }
    .lead-headline {
      font-family: var(--serif);
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 700; line-height: 1.25;
      letter-spacing: -0.015em; color: var(--ink);
    }

    /* ── CARD GRID (stories 1+) ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    /* ── GRID HEADER ── */
    .grid-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 10px;
    }
    .grid-hdr-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink3);
      white-space: nowrap;
    }
    .grid-hdr-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .grid-hdr-count {
      font-size: 10px; font-weight: 600;
      color: var(--ink3); white-space: nowrap;
    }

    /* ── story teaser ── */
    .lead-teaser {
      font-size: 12px; line-height: 1.5; color: var(--ink2);
      margin-top: 5px;
    }
    .lead-sources {
      margin-top: 8px; font-size: 11px; color: var(--ink3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lead-source-link {
      color: var(--accent); font-weight: 600; text-decoration: none;
    }
    .lead-source-link::after { content: " ↗"; opacity: 0.55; font-size: 9px; }
    .lead-source-link:hover { text-decoration: underline; }
    .card-summary {
      font-size: 12px; line-height: 1.5; color: var(--ink2);
      margin-top: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── CARDS ── */
    .news-card {
      background: var(--surface);
      border: 1px solid rgba(80,68,50,0.16);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .news-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    [data-theme="dark"] .news-card:hover { box-shadow: 0 5px 20px rgba(0,0,0,0.4); }

    .card-img {
      width: 100%;
      height: 118px;
      object-fit: cover;
      display: block;
      background: var(--lead-bg);
    }
    .img-placeholder {
      width: 100%;
      height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 22% 20%, rgba(75,107,251,0.18), transparent 28%),
        linear-gradient(135deg, var(--tag-bg), var(--lead-bg));
      color: var(--tag-txt);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .lead-card .img-placeholder {
      width: 42%; height: auto; min-height: 150px; flex-shrink: 0;
    }

    .card-text {
      flex: 1;
      min-width: 0;
      padding: 11px 13px 12px;
      display: flex;
      flex-direction: column;
    }
    .card-headline {
      font-size: 13.5px; font-weight: 700;
      color: var(--ink); line-height: 1.35;
    }

    /* ── empty ── */
    .empty { padding: 48px 0; text-align: center; color: var(--ink3); }
    .empty-hed { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink2); margin-bottom: 5px; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: backdropIn 0.15s ease;
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%; max-width: 580px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: modalIn 0.18s ease;
    }
    [data-theme="dark"] .modal { box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .modal-close {
      position: sticky; top: 12px;
      float: right; margin: 12px 12px 0 0;
      width: 28px; height: 28px;
      background: var(--border); border: none; border-radius: 50%;
      color: var(--ink2); font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0; z-index: 1;
    }
    .modal-close:hover { background: var(--ink3); color: #fff; }

    .modal-img {
      width: 100%; max-height: 70vh; object-fit: contain; display: block;
      background: #000;
      /* sits at top of modal, under the close btn row */
      margin-top: -28px; /* pull up behind close btn area */
    }
    /* when there's an image, add top padding to body so close btn is above image */
    .modal-has-img .modal-img { margin-top: 0; }
    .modal-has-img .modal-close { position: absolute; background: rgba(0,0,0,0.4); color: #fff; }
    .modal-has-img .modal-close:hover { background: rgba(0,0,0,0.7); }

    .modal-body { padding: 16px 20px 20px; }
    .modal-topic {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .modal-headline {
      font-family: var(--serif);
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em; color: var(--ink);
      margin-bottom: 12px;
    }
    .modal-summary {
      font-family: var(--serif);
      font-size: 14.5px; line-height: 1.85; color: var(--ink2);
    }
    .modal-footer {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 5px 10px;
      padding-top: 12px; border-top: 1px solid var(--border);
      margin-top: 14px;
    }
    .modal-sources { display: flex; gap: 7px; flex-wrap: wrap; flex: 1; }
    .source-link {
      font-size: 11px; font-weight: 600; color: var(--accent);
      text-decoration: none; white-space: nowrap;
    }
    .source-link::after { content: " ↗"; opacity: 0.55; font-size: 9px; }
    .source-link:hover { text-decoration: underline; }
    .readtime { font-size: 11px; color: var(--ink3); white-space: nowrap; }

    /* ── EXTRAS sidebar ── */
    .extras { min-width: 0; }
    .extras-title { font-family: var(--serif); font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .extras-grid { display: grid; grid-template-columns: 1fr; gap: 7px; }
    .extras-section + .extras-section { margin-top: 18px; }
    .extras-section-hdr {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 7px;
    }
    .extra-card {
      background: var(--surface); border: 1px solid rgba(80,68,50,0.16);
      border-radius: var(--r);
      padding: 10px; display: flex; align-items: flex-start;
      gap: 9px; box-shadow: var(--shadow); color: inherit;
      text-decoration: none;
    }
    .extra-card:hover .extra-link { text-decoration: underline; }
    .extras-kicker {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .extra-body { min-width: 0; }
    .extra-link {
      color: var(--ink); font-size: 12px; line-height: 1.3;
      text-decoration: none; font-weight: 600;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .extra-img {
      width: 40px; height: 40px; object-fit: cover;
      border-radius: 8px; display: block; background: var(--lead-bg); flex-shrink: 0;
    }
    .extra-desc {
      color: var(--ink2); font-size: 11px; line-height: 1.4; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .extra-meta {
      color: var(--ink3); font-size: 10.5px; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .extras-more {
      color: var(--accent); font-size: 11px;
      font-weight: 600; text-decoration: none; white-space: nowrap;
    }
    .extras-more::after { content: " ↗"; opacity: 0.6; font-size: 9px; }
    .extras-more:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .content-grid { grid-template-columns: 1fr; }
      .extras { order: 2; margin-top: 24px; }
      .news-col { order: 1; }
      .extras-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
    @media (max-width: 540px) {
      .wrap { padding: 16px 13px 44px; }
      .mast { flex-direction: column; gap: 8px; margin-bottom: 18px; }
      .mast-right { flex-direction: row; align-items: center; }
      .mast-sub { text-align: left; }
      .lead-card { flex-direction: column; min-height: 0; }
      .lead-img, .lead-card .img-placeholder {
        width: 100%; height: 125px; min-height: 0;
      }
      .card-grid { grid-template-columns: 1fr; }
      .modal { max-height: 92vh; border-radius: 14px; }
      .extras-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, .modal, .modal-backdrop { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <div class="mast-left">
      <p class="mast-kicker" id="mast-kicker"></p>
      <h1 class="mast-title" id="mast-title"></h1>
      <div class="tags" id="tags"></div>
    </div>
    <div class="mast-right">
      <button class="theme-btn" id="theme-btn" type="button">Dark</button>
      <p class="mast-sub" id="mast-sub"></p>
    </div>
  </header>

  <div class="content-grid">
    <aside class="extras" id="extras" aria-label="Extras"></aside>
    <main class="news-col" id="main" aria-label="Today's stories"></main>
  </div>

</div>

1723113", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/gdb/status/2067700691062464887", "topic": "AI Coding Tools"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "03", "headline": "Claude Code turns agent sessions into shareable live artifacts", "summary": "Anthropic rolled out Artifacts in Claude Code for Team and Enterprise plans, so a coding session can publish an interactive page such as a PR walkthrough or living project dashboard. I like this because it treats the agent’s intermediate work as a collaborative object, not just terminal output that disappears into scrollback.", "sources": [{"name": "X", "url": "https://x.com/claudeai/status/2067671912038240487", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/ClaudeDevs/status/2067672094209675373", "topic": "AI Coding Tools"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "04", "headline": "Claude’s robodog test shows agent autonomy moving into hardware workflows", "summary": "Anthropic reran Project Fetch with Claude Opus 4.7 operating through Claude Code and reports it completed the software-side robodog tasks roughly 20x faster than last year’s best human team using Opus 4.1. The model still failed at precise physical ball retrieval, but the pattern is notable: tasks that first needed humans plus AI are becoming mostly model-driven.", "sources": [{"name": "X", "url": "https://x.com/AnthropicAI/status/2067651699486200091", "topic": "AI Agents & Agentic Frameworks"}], "image": {"url": "https://pbs.twimg.com/card_img/2067709356888502272/GdqsD8bA?format=jpg&name=800x419", "alt": "Anthropic Project Fetch card image"}, "label": null, "read_time": null, "topics": ["AI Agents & Agentic Frameworks"], "topic": "AI Agents & Agentic Frameworks"}, {"number": "05", "headline": "OpenAI is training for alignment that survives new domains", "summary": "OpenAI published research on reinforcement learning for broadly beneficial behavior, using realistic scenarios across health, education, science, law, engineering, economics, and other domains to improve traits like honesty, corrigibility, fairness, and epistemic humility. The interesting claim is generalization: small amounts of beneficial-trait data mixed into post-training improved many independent safety and alignment evals and made models harder to steer toward harmful behavior.", "sources": [{"name": "X", "url": "https://x.com/OpenAI/status/2067722688165232654", "topic": "Frontier Labs"}], "image": {"url": "https://pbs.twimg.com/card_img/2067721366003204096/kW9zuLfb?format=jpg&name=800x419", "alt": "OpenAI alignment research card image"}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "06", "headline": "Agentic QA is becoming the missing loop for AI-written code", "summary": "TestSprite 3.0 is positioning itself as a verifier that drives the running product: parallel exploration agents, per-agent video replay, backend testing, UI drift auto-heal, dynamic variables, and machine-readable failure bundles for coding agents. The sharp part is the framing: if agents can write code overnight, the verifier has to live in the same terminal/IDE loop and feed fixes back to the agent.", "sources": [{"name": "X", "url": "https://x.com/Mr_Aiden_Ai/status/2067980540096225745", "topic": "AI LLM Tooling"}], "image": {"url": "https://pbs.twimg.com/media/HLLxQmoaUAAxH0g.jpg", "alt": "TestSprite 3.0 product image"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "07", "headline": "Natural-language rewards are entering agent RL pipelines", "summary": "OpenPipe’s ART stack is getting attention for RULER-style rewards, where criteria are written in plain English and an LLM grades each agent trajectory for GRPO training instead of relying on hand-coded scoring functions. The linked docs also point to W&B serverless RL, instant checkpoint deployment, and examples like email search, 2048, LangGraph, MCP, and game environments.", "sources": [{"name": "X", "url": "https://x.com/akshay_pachaar/status/2067969579188720028", "topic": "AI LLM Tooling"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "08", "headline": "GLM-5.2 has open-weight engineers asking for better serving paths", "summary": "The GLM-5.2 chatter is unusually technical: Sebastian Raschka highlights MLA, DeepSeek Sparse Attention, and a new IndexShare trick that reuses sparse-attention token indices across layers to make 1M-token inference cheaper. Practitioners are already asking which harnesses and providers can run it well, which is the real test for any strong open-weight model.", "sources": [{"name": "X", "url": "https://x.com/rasbt/status/2067612153020838055", "topic": "AI Startups & Open Source"}, {"name": "X", "url": "https://x.com/simonw/status/2067834436172071342", "topic": "AI Startups & Open Source"}, {"name": "X", "url": "https://x.com/mattpocockuk/status/2067899664209187273", "topic": "AI Startups & Open Source"}], "image": {"url": "https://pbs.twimg.com/media/HLGiRS6WgAACvRH.jpg", "alt": "GLM-5.2 architecture discussion image"}, "label": null, "read_time": null, "topics": ["AI Startups & Open Source"], "topic": "AI Startups & Open Source"}, {"number": "09", "headline": "Cerebras puts multimodal Gemma 4 on a 1,500-token-per-second path", "summary": "Cerebras says Google DeepMind’s Gemma 4 is now running as its first multimodal model on the platform at 1,500 tokens per second, claiming a 15x speedup over the nearest comparable model. For agent loops that need see-reason-act-retry cycles, this kind of latency change matters more than another small benchmark delta.", "sources": [{"name": "X", "url": "https://x.com/andrewdfeldman/status/2067984304471167121", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "10", "headline": "Liquid AI ships tiny multilingual retrieval models with millisecond latency claims", "summary": "Liquid AI introduced LFM2.5-Embedding-350M and LFM2.5-ColBERT-350M for multilingual and cross-lingual retrieval across 11 languages, claiming end-to-end retrieval latency as low as 1.5ms with its enterprise stack. Fast retrieval models are still one of the highest-leverage parts of RAG systems, especially when the model layer keeps getting cheaper and more routable.", "sources": [{"name": "X", "url": "https://x.com/liquidai/status/2067610173024219225", "topic": "AI LLM Tooling"}], "image": {"url": "https://pbs.twimg.com/media/HLGgfmwXwAA8YaR.jpg", "alt": "Liquid AI retrieval model announcement image"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "11", "headline": "An open 9B extraction model is closing in on frontier document parsing", "summary": "Vik Paruchuri’s team is open sourcing a 9B model for structured document extraction that scores 90.2% on their benchmark, close to Gemini 3.5 Flash at 91.3% and ahead of NuExtract3 at 81.5%. The practical details matter here: 9.5s p50 timing and JSON-schema compliance make it directly relevant for document AI pipelines.", "sources": [{"name": "X", "url": "https://x.com/VikParuchuri/status/2067941596306231421", "topic": "AI Startups & Open Source"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Startups & Open Source"], "topic": "AI Startups & Open Source"}, {"number": "12", "headline": "Qualcomm’s NPU compiler looks much stranger under the hood", "summary": "A reverse-engineering writeup on Qualcomm’s NPU compiler claims it silently downgrades model weight precision, uses the HiGHS linear-programming solver for memory placement, and can produce a 33x DDR-traffic difference across chips with identical reported VTCM. Edge AI deployment is mostly compiler behavior now, and this is the kind of undocumented machinery that explains why real-world NPU performance is so hard to predict.", "sources": [{"name": "X", "url": "https://x.com/datavorous_/status/2067961873195229671", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://pbs.twimg.com/media/HLLfedga4AAC3d1.png", "alt": "Qualcomm NPU compiler reverse engineering screenshot"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "13", "headline": "Architect Labs wants AI to design and verify chips end-to-end", "summary": "Architect Labs launched with a $24M seed round led by Kindred Ventures and a founding team that says it has taped out 80+ production chips and worked across Meta AI silicon, Intel neuromorphic chips, Anthropic, xAI, and Google DeepMind. The company says some AI-generated chip designs are headed to leading-edge tapeout later this year, which makes this more interesting than the usual chip-startup pitch deck.", "sources": [{"name": "X", "url": "https://x.com/axi_master/status/2067655053050352041", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://pbs.twimg.com/media/HLHI-m-bYAAdwBB.jpg", "alt": "Architect Labs launch image"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "14", "headline": "Google’s TPU paper puts hard numbers on eight years of accelerator scaling", "summary": "Jeff Dean pointed to a Google paper covering TPU v2 through Ironwood, including a 10x increase in HBM capacity and bandwidth per node, 100x peak node performance, 3,600x supercomputer performance, and roughly 30x better TFLOPS per watt. The pod-scale jump from 256 chips in TPUv2 to 9,216 in Ironwood is a useful reminder that training progress is as much systems engineering as model architecture.", "sources": [{"name": "X", "url": "https://x.com/JeffDean/status/2067681662318924244", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://pbs.twimg.com/media/HLHggdRawAApUmQ.jpg", "alt": "Google TPU supercomputer paper image"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "15", "headline": "Amazon is openly considering Trainium racks as a chip business", "summary": "AWS is in early talks to sell Trainium AI chips for third-party data centers, with Andy Jassy previously framing the internal chip effort as a potential $50B standalone run-rate business. If Amazon actually sells racks outside AWS, it becomes a more direct Nvidia competitor instead of just a cloud provider with custom accelerators.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/amazon-hopes-to-challenge-nvidia-more-directly-by-selling-its-ai-chips/", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2022/11/GettyImages-1421680585.jpg?resize=1200,675", "alt": "Amazon Web Services data center image"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "16", "headline": "Baseten’s next round shows how hot the inference layer still is", "summary": "Baseten is reportedly close to raising $1.5B at a headline valuation around $13B, only months after a $300M round at $5B. The deal structure may be split-priced, but the signal is clear: model routing, serving cost control, and open-model inference are still drawing enormous capital.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/ai-inference-startup-baseten-reportedly-raising-1-5b-months-after-its-last-mega-round/", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2024/03/GettyImages-1502217391.jpg?resize=1200,800", "alt": "Data center hardware image"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "17", "headline": "Elastic is buying into AI SRE with DeductiveAI", "summary": "Elastic has reportedly agreed to acquire DeductiveAI for up to $85M, bringing in a startup focused on using AI to catch and resolve software bugs and system failures. This fits the broader post-codegen bottleneck: observability vendors want agentic remediation, not just dashboards that tell humans what broke.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/source-elastic-agrees-to-buy-crv-backed-deductiveai-for-up-to-85m/", "topic": "AI Coding Tools"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2018/03/gettyimages-824355868.jpg?resize=1200,760", "alt": "Software engineering office image"}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "18", "headline": "Frontier labs are recruiting for both models and governance", "summary": "OpenAI is adding Transformer co-author Noam Shazeer and policy operator Dean Ball ahead of its expected IPO path, while AlphaFold lead John Jumper says he is leaving Google DeepMind for Anthropic after a recharge break. The talent moves say a lot about where frontier labs think leverage lives now: core model intuition, scientific credibility, and direct policy/governance capacity.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/18/openai-is-bringing-on-some-big-guns-in-the-lead-up-to-its-ipo/", "topic": "Frontier Labs"}, {"name": "X", "url": "https://x.com/JohnJumperSci/status/2068001285173834106", "topic": "Frontier Labs"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/noam-shazeer-deal-ball.png?resize=1200,800", "alt": "Noam Shazeer and Dean Ball image collage"}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "19", "headline": "Anthropic’s model-access fight is turning into a governance test case", "summary": "TechCrunch’s coverage says the U.S. government forced Anthropic to pull Fable 5 and Mythos 5 over national-security concerns after reported guardrail bypasses, while security researchers have pushed back that similar jailbreak issues exist elsewhere. The important bit for builders is not the branding drama; it is that frontier-model availability may now change abruptly because of policy, nationality, and access-control constraints.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/podcast/the-us-banned-anthropics-fable-5-release-but-the-numbers-dont-seem-to-care/", "topic": "Frontier Labs"}, {"name": "TechCrunch", "url": "https://techcrunch.com/video/is-the-us-governments-anthropic-ban-accidentally-helping-the-brand/", "topic": "Frontier Labs"}, {"name": "X", "url": "https://x.com/shensi/status/2067661954236182857", "topic": "Frontier Labs"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "20", "headline": "Reliance is trying to make AI native to the phone network", "summary": "Reliance announced Jio Call Agent, an AI assistant that can join calls to transcribe, summarize, and perform tasks like booking cabs or reservations, with a launch planned for Jio’s 500M-plus users. It also showed AI features in MyJio, a TeleFrame home display, sector-specific services, and broader infrastructure plans, making this one of the more serious distribution plays for ambient AI.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/19/billionaire-ambani-wants-ai-in-every-call-app-and-home/", "topic": "AI Products"}, {"name": "X", "url": "https://x.com/TechCrunch/status/2067991847415480469", "topic": "AI Products"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/02/reliance-mukesh-ambani.jpg?resize=1200,800", "alt": "Mukesh Ambani at a Reliance event"}, "label": null, "read_time": null, "topics": ["AI Products"], "topic": "AI Products"}, {"number": "21", "headline": "OpenAI’s o3 Deep Research gets a rare-disease case study", "summary": "OpenAI and Boston Children’s Hospital used o3 Deep Research in work discussed around a new NEJM AI paper on helping diagnose rare genetic diseases in children. The reason I’d still track this as an engineer is that medical diagnosis is a brutally high-stakes retrieval, reasoning, and uncertainty-calibration workflow, not just another chatbot demo.", "sources": [{"name": "X", "url": "https://x.com/OpenAINewsroom/status/2068008435548037553", "topic": "Frontier Labs"}, {"name": "X", "url": "https://x.com/gdb/status/2068016345451831480", "topic": "Frontier Labs"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "22", "headline": "Databricks’ Omnigent gets a search partner for grounded agents", "summary": "Nimble says it is the launch web-search partner for Databricks’ Omnigent, an open-source AI agent meta-harness, exposing search as a configurable provider for orchestrated agents. It is a small integration story, but it captures the larger move from picking one model to composing model, search, tools, cost, and accuracy policies into an agent stack.", "sources": [{"name": "X", "url": "https://x.com/viipin8/status/2067959394110001495", "topic": "AI Agents & Agentic Frameworks"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Agents & Agentic Frameworks"], "topic": "AI Agents & Agentic Frameworks"}], "extras": {"product_hunt": [{"rank": 1, "name": "Upstream", "tagline": "The inbox designed for humans and agents", "url": "https://www.producthunt.com/products/upstream-3?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 638, "comments_count": 242, "image_url": "https://ph-files.imgix.net/b5e8c870-d74a-4b7a-9bd0-30ffb55d8895.png?auto=format"}, {"rank": 2, "name": "Honestly", "tagline": "See what Reddit and TikTok honestly think about your product", "url": "https://www.producthunt.com/products/honestly?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 502, "comments_count": 130, "image_url": "https://ph-files.imgix.net/2704d5b4-f4b5-48a3-a47f-252a26fea769.png?auto=format"}, {"rank": 3, "name": "Jesse", "tagline": "Stop building Apollo/Clay lists. Search the live internet.", "url": "https://www.producthunt.com/products/jesse-2?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 387, "comments_count": 85, "image_url": "https://ph-files.imgix.net/1bb6b29d-c5d2-4640-abcb-c0809d33efc5.png?auto=format"}, {"rank": 4, "name": "Tabstack Dev Tools", "tagline": "Ditch your scraper. Make one API call with any tool.", "url": "https://www.producthunt.com/products/tabstack?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 353, "comments_count": 58, "image_url": "https://ph-files.imgix.net/a1e8c483-7b8f-44d3-8a73-32c0a5be8a0a.png?auto=format"}, {"rank": 5, "name": "Elvin", "tagline": "Proactive AI that finds and finishes work before you ask", "url": "https://www.producthunt.com/products/elvin?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 251, "comments_count": 33, "image_url": "https://ph-files.imgix.net/dfcbc522-ad1c-4dda-b41b-d7a0914f4e21.png?auto=format"}], "product_hunt_more_url": "https://www.producthunt.com/leaderboard/daily/2026/6/18", "github_trending": [{"rank": 1, "name": "DeusData/codebase-memory-mcp", "description": "High-performance code intelligence MCP server. Indexes codebases into a persistent knowledge graph — average repo in milliseconds. 158 languages, sub-ms queries, 99% fewer tokens. Single static binary, zero dependencies.", "url": "https://github.com/DeusData/codebase-memory-mcp", "image_url": "https://opengraph.githubassets.com/1/DeusData/codebase-memory-mcp", "language": "C", "stars": "7,902", "stars_today": "1,055 stars today"}, {"rank": 2, "name": "google-research/timesfm", "description": "TimesFM (Time Series Foundation Model) is a pretrained time-series foundation model developed by Google Research for time-series forecasting.", "url": "https://github.com/google-research/timesfm", "image_url": "https://opengraph.githubassets.com/1/google-research/timesfm", "language": "Python", "stars": "23,977", "stars_today": "1,516 stars today"}, {"rank": 3, "name": "palmier-io/palmier-pro", "description": "macOS video editor built for AI", "url": "https://github.com/palmier-io/palmier-pro", "image_url": "https://opengraph.githubassets.com/1/palmier-io/palmier-pro", "language": "Swift", "stars": "1,617", "stars_today": "749 stars today"}]}, "preview_bg": {"light": "#EDFCF9", "dark": "#0C2420"}}</script>
<script>
(function () {
  var ed      = JSON.parse(document.getElementById("ed").textContent);
  var stories = ed.stories || [];
  var extras  = ed.extras  || {};

  /* ── masthead ── */
  var kickerEl = document.getElementById("mast-kicker");
  if (ed.persona) {
    kickerEl.innerHTML = (ed.date||"") + ' &middot; <span class="mast-kicker-accent">' + ed.persona + '</span>';
  } else {
    kickerEl.textContent = ed.date || "";
  }
  document.getElementById("mast-title").textContent = ed.issue_title || (stories.length + " stories");
  document.getElementById("mast-sub").textContent   = ed.email || "";
  (ed.tags||[]).forEach(function(t){
    var s = document.createElement("span"); s.className="tag"; s.textContent=t;
    document.getElementById("tags").appendChild(s);
  });

  /* ── helpers ── */
  function el(tag,cls,text){
    var n=document.createElement(tag);
    if(cls) n.className=cls;
    if(text!=null) n.textContent=text;
    return n;
  }
  function makeImg(url,alt,cls){
    var img=document.createElement("img");
    img.className=cls; img.src=url; img.alt=alt||""; img.loading="lazy";
    img.onerror=function(){this.remove();};
    return img;
  }
  function topicFull(story){
    return (story.topics||[]).join(" · ") || story.topic || "";
  }
  function sourceNames(story){
    return (story.sources||[]).map(function(s){return s.name;}).filter(Boolean).join(", ");
  }
  function balanceCardSummaries(grid){
    requestAnimationFrame(function(){
      Array.prototype.forEach.call(grid.querySelectorAll(".news-card"), function(card){
        var headline = card.querySelector(".card-headline");
        var summary  = card.querySelector(".card-summary");
        if(!headline || !summary) return;
        var lineHeight = parseFloat(getComputedStyle(headline).lineHeight) || 18;
        var headlineLines = Math.max(1, Math.round(headline.offsetHeight / lineHeight));
        summary.style.webkitLineClamp = Math.max(2, 6 - headlineLines);
      });
    });
  }
  /* ── background ── */
  function applyBg(){
    var pb=ed.preview_bg||{};
    var theme=document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    document.body.style.background=pb[theme]||"var(--lead-bg)";
  }
  applyBg();

  /* ── MODAL ── */
  function openModal(story){
    var hasImg = !!(story.image && story.image.url);

    var backdrop = el("div","modal-backdrop");
    var modal    = el("div","modal" + (hasImg?" modal-has-img":""));
    modal.setAttribute("role","dialog");
    modal.setAttribute("aria-modal","true");

    /* close button */
    var closeBtn = el("button","modal-close","×");
    closeBtn.setAttribute("aria-label","Close");
    modal.appendChild(closeBtn);

    /* image */
    if(hasImg){
      modal.appendChild(makeImg(story.image.url, story.image.alt||story.headline, "modal-img"));
    }

    /* body */
    var body = el("div","modal-body");

    var topicEl = el("p","modal-topic");
    topicEl.textContent = topicFull(story);
    if(story.label) topicEl.appendChild(el("span",null," · "+story.label));
    body.appendChild(topicEl);

    body.appendChild(el("h2","modal-headline", story.headline));
    if(story.summary) body.appendChild(el("p","modal-summary", story.summary));

    /* footer: sources + readtime */
    var footer = el("div","modal-footer");
    var srcs   = el("span","modal-sources");
    (story.sources||[]).forEach(function(src){
      if(!src.name) return;
      var a = el("a","source-link",src.name);
      a.href=src.url||"#"; a.target="_blank"; a.rel="noopener noreferrer";
      srcs.appendChild(a);
    });
    footer.appendChild(srcs);
    if(story.read_time) footer.appendChild(el("span","readtime",story.read_time));
    body.appendChild(footer);

    modal.appendChild(body);
    backdrop.appendChild(modal);
    document.body.appendChild(backdrop);
    document.body.style.overflow="hidden";

    function close(){
      backdrop.style.animation="backdropIn 0.12s ease reverse";
      modal.style.animation="modalIn 0.12s ease reverse";
      setTimeout(function(){
        backdrop.remove();
        document.body.style.overflow="";
      }, 110);
      document.removeEventListener("keydown",onKey);
    }
    function onKey(e){ if(e.key==="Escape") close(); }

    closeBtn.addEventListener("click", close);
    backdrop.addEventListener("click", function(e){ if(e.target===backdrop) close(); });
    document.addEventListener("keydown", onKey);

    /* focus trap: focus modal */
    setTimeout(function(){ closeBtn.focus(); }, 50);
  }

  /* ── render ── */
  var main = document.getElementById("main");

  if(!stories.length){
    var empty=el("div","empty");
    empty.innerHTML='<p class="empty-hed">Nothing today</p><p>No stories matched your topics.</p>';
    main.appendChild(empty);
  }

  /* LEAD (story 0) */
  if(stories.length){
    var lead    = stories[0];
    var leadEl  = el("div","lead-card");

    var imgUrl = lead.image&&lead.image.url;
    if(imgUrl){
      var leadImg = makeImg(imgUrl, lead.image.alt||lead.headline, "lead-img");
      leadImg.onerror = function(){ this.replaceWith(el("div","img-placeholder","No image")); };
      leadEl.appendChild(leadImg);
    } else {
      leadEl.appendChild(el("div","img-placeholder","No image"));
    }

    var leadBody = el("div","lead-body");
    var leadMeta = el("p","lead-meta");
    leadMeta.appendChild(el("span",null,"Lead story"));
    if(lead.read_time) leadMeta.appendChild(el("span","lead-readtime",lead.read_time));
    leadBody.appendChild(leadMeta);
    leadBody.appendChild(el("p","lead-headline", lead.headline));
    if(lead.summary){
      leadBody.appendChild(el("p","lead-teaser", lead.summary));
    }
    if((lead.sources||[]).length){
      var leadSources = el("p","lead-sources");
      (lead.sources||[]).forEach(function(src, i){
        if(!src.name) return;
        if(i) leadSources.appendChild(document.createTextNode(", "));
        var a = el("a","lead-source-link",src.name);
        a.href=src.url||"#"; a.target="_blank"; a.rel="noopener noreferrer";
        leadSources.appendChild(a);
      });
      if(leadSources.childNodes.length) leadBody.appendChild(leadSources);
    }

    leadEl.appendChild(leadBody);
    main.appendChild(leadEl);
  }

  /* CARD GRID (stories 1+) */
  if(stories.length>1){
    /* section header */
    var gHdr = el("div","grid-hdr");
    gHdr.appendChild(el("span","grid-hdr-label","More stories"));
    gHdr.appendChild(el("span","grid-hdr-line"));
    gHdr.appendChild(el("span","grid-hdr-count",(stories.length-1)+" stories"));
    main.appendChild(gHdr);

    var grid = el("div","card-grid");
    stories.slice(1).forEach(function(story){
      var imgUrl = story.image && story.image.url;
      var card = el("div", "news-card");
      card.setAttribute("role","button");
      card.setAttribute("tabindex","0");
      card.setAttribute("aria-label","Read: "+story.headline);

      if(imgUrl){
        var img = makeImg(imgUrl, story.image.alt||story.headline, "card-img");
        img.onerror = function(){ this.replaceWith(el("div","img-placeholder","No image")); };
        card.appendChild(img);
      } else {
        card.appendChild(el("div","img-placeholder","No image"));
      }

      var text = el("div","card-text");
      text.appendChild(el("p","card-headline", story.headline));
      if(story.summary) text.appendChild(el("p","card-summary", story.summary));
      card.appendChild(text);

      card.addEventListener("click", function(){ openModal(story); });
      card.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" ") openModal(story); });
      grid.appendChild(card);
    });
    main.appendChild(grid);
    balanceCardSummaries(grid);
    window.addEventListener("resize", function(){ balanceCardSummaries(grid); });
  }

  /* ── EXTRAS ── */
  function appendExtraSection(parent,title,items,type,moreUrl){
    var section=el("section","extras-section");
    var header=el("div","extras-section-hdr");
    header.appendChild(el("p","extras-kicker",title));
    if(moreUrl){
      var more=el("a","extras-more","More");
      more.href=moreUrl; more.target="_blank"; more.rel="noopener noreferrer";
      header.appendChild(more);
    }
    section.appendChild(header);

    var grid=el("div","extras-grid");
    (items||[]).forEach(function(item){
      var card=el("a","extra-card");
      card.href=item.url||"#"; card.target="_blank"; card.rel="noopener noreferrer";
      if(item.image_url) card.appendChild(makeImg(item.image_url,item.name||"","extra-img"));
      var body=el("div","extra-body");
      body.appendChild(el("span","extra-link","#"+item.rank+" "+item.name));
      var desc=item.tagline||item.description;
      if(desc) body.appendChild(el("p","extra-desc",desc));
      var meta=type==="product"
        ?((item.votes_count||0)+" votes"+(item.comments_count?" · "+item.comments_count+" comments":""))
        :([item.language,item.stars_today].filter(Boolean).join(" · "));
      if(meta) body.appendChild(el("p","extra-meta",meta));
      card.appendChild(body);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    parent.appendChild(section);
  }

  var extrasEl = document.getElementById("extras");
  var products = extras.product_hunt   ||[];
  var repos    = extras.github_trending||[];
  if(products.length||repos.length){
    extrasEl.appendChild(el("h2","extras-title","Extras"));
    if(products.length) appendExtraSection(extrasEl,"Product Hunt Yesterday Top 5",products,"product",extras.product_hunt_more_url);
    if(repos.length)    appendExtraSection(extrasEl,"GitHub Trending Top 3",repos,"repo",extras.github_trending_more_url||"https://github.com/trending");
  } else { extrasEl.remove(); }

  /* ── theme ── */
  var btn=document.getElementById("theme-btn");
  function getTheme(){
    return document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  }
  function applyTheme(t){
    document.documentElement.dataset.theme=t;
    btn.textContent=t==="dark"?"Light":"Dark";
    try{localStorage.setItem("nl-theme",t);}catch(e){}
    applyBg();
  }
  applyTheme(getTheme());
  btn.addEventListener("click",function(){applyTheme(getTheme()==="dark"?"light":"dark");});
}());
</script>
</body>
</html>
