<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <script>try{var t=localStorage.getItem("nl-theme");if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
  <style>
    :root {
      --bg:      #C9D8E2;
      --surface: rgba(238,244,246,0.78);
      --paper:   rgba(248,251,252,0.94);
      --paper2:  rgba(255,255,255,0.72);
      --lead-bg: #9FB8C8;
      --ink:     #17212A;
      --ink2:    #35434D;
      --ink3:    #687681;
      --accent:  #315BA8;
      --border:  rgba(38,64,82,0.16);
      --tag-bg:  rgba(49,91,168,0.12);
      --tag-txt: #294F94;
      --hover:   rgba(247,250,251,0.88);
      --glow:    rgba(49,91,168,0.18);
      --surface-hi: rgba(255,255,255,0.46);
      --surface-lo: rgba(82,111,130,0.10);
      --grid:    rgba(38,64,82,0.055);
      --shadow:  0 1px 1px rgba(255,255,255,0.70) inset, 0 10px 28px rgba(28,45,58,0.10), 0 0 0 1px rgba(255,255,255,0.18);
      --shadow-hover: 0 1px 1px rgba(255,255,255,0.74) inset, 0 14px 34px rgba(28,45,58,0.14), 0 0 0 1px rgba(255,255,255,0.20);
      --serif:   'Merriweather', Georgia, serif;
      --sans:    'Inter', system-ui, -apple-system, sans-serif;
      --r:       11px;
    }
    [data-theme="dark"] {
      --bg:      #0B1822;
      --surface: rgba(28,25,21,0.92);
      --paper:   rgba(18,25,31,0.96);
      --paper2:  rgba(255,255,255,0.055);
      --lead-bg: #11133A;
      --ink:     #F4EDDF;
      --ink2:    #D0C5B4;
      --ink3:    #8B8377;
      --accent:  #91A4FF;
      --border:  rgba(218,200,166,0.13);
      --tag-bg:  rgba(75,107,251,0.16);
      --tag-txt: #AAB8FF;
      --hover:   rgba(255,255,255,0.055);
      --grid:    rgba(218,200,166,0.045);
      --shadow:  0 1px 2px rgba(0,0,0,0.34), 0 12px 34px rgba(0,0,0,0.24);
      --shadow-hover: 0 1px 2px rgba(0,0,0,0.34), 0 16px 42px rgba(0,0,0,0.30);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--accent); color: #fff; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    body {
      background:
        radial-gradient(ellipse 56vw 34vw at 86% -10%, var(--glow), transparent 68%),
        linear-gradient(180deg, rgba(255,255,255,0.28), transparent 30vh),
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
      background-attachment: fixed;
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }
    [data-theme="dark"] body {
      background:
        radial-gradient(ellipse 56vw 34vw at 86% -10%, rgba(145,164,255,0.11), transparent 68%),
        linear-gradient(180deg, rgba(255,255,255,0.035), transparent 30vh),
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
      background-attachment: fixed;
    }

    /* ── layout ── */
    .wrap {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px clamp(20px, 3vw, 44px) 64px;
    }
    .content-grid {
      display: grid;
      grid-template-columns: minmax(250px, 300px) minmax(0,1fr);
      gap: 24px;
      align-items: start;
    }
    .news-col { min-width: 0; }
    .content-grid.no-extras { grid-template-columns: 1fr; }

    /* ── masthead ── */
    .mast {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .mast-left { min-width: 0; padding-right: 76px; position: relative; z-index: 1; }
    .mast-kicker {
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }
    .mast-kicker-accent { color: var(--accent); font-weight: 600; }
    .mast-title {
      font-family: var(--serif);
      max-width: 980px;
      font-size: clamp(34px, 4.6vw, 64px);
      font-weight: 900; line-height: 0.99;
      letter-spacing: -0.035em; color: var(--ink); margin-bottom: 12px;
    }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; background: var(--tag-bg);
      color: var(--tag-txt); border-radius: 999px; padding: 5px 11px;
      border: 1px solid rgba(49,91,168,0.10);
    }
    .mast-right {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px; flex-shrink: 0;
    }
    .theme-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      color: var(--ink2); background: none; border: 1px solid var(--border);
      border-radius: 999px; padding: 6px 12px; cursor: pointer;
      backdrop-filter: blur(8px);
      transition: color 0.1s, border-color 0.1s, background 0.1s, transform 0.1s;
    }
    .theme-btn:hover { color: var(--ink); background: var(--hover); border-color: var(--ink3); transform: translateY(-1px); }

    /* ── story carousel ── */
    .story-carousel {
      margin: 0 0 18px;
      border: 1px solid rgba(49,91,168,0.28);
      border-radius: 26px;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      overflow: hidden;
      position: relative;
    }
    [data-theme="dark"] .story-carousel {
      border-color: rgba(145,164,255,0.28);
      background: var(--paper);
    }
    .story-carousel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), transparent 62%);
      opacity: 0.55;
      pointer-events: none;
    }
    .story-carousel[hidden] { display: none; }
    .carousel-hdr {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 18px 0;
      position: relative;
      z-index: 1;
    }
    .carousel-kicker {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .carousel-title {
      font-family: var(--serif);
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
    }
    .carousel-instruction {
      font-size: 12px;
      color: var(--ink3);
      margin-top: 3px;
    }
    .carousel-badge {
      flex-shrink: 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--tag-bg);
      color: var(--tag-txt);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 10px;
    }
    .carousel-progress {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 18px 16px;
    }
    .carousel-dot {
      width: 100%;
      height: 5px;
      border: 0;
      border-radius: 999px;
      background: var(--border);
      cursor: pointer;
      opacity: 0.72;
      transition: background 0.15s, opacity 0.15s, transform 0.15s;
    }
    .carousel-dot[aria-current="true"] {
      background: var(--accent);
      opacity: 1;
      transform: scaleY(1.35);
    }
    .carousel-dot:hover { opacity: 1; }
    .carousel-window {
      margin: 12px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: var(--paper2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.38);
      overflow: hidden;
      overscroll-behavior: contain;
      touch-action: none;
      transition: height 0.28s ease;
    }
    [data-theme="dark"] .carousel-window {
      background: var(--paper2);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .carousel-hint {
      position: absolute;
      left: 50%;
      bottom: 16px;
      z-index: 2;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.32);
      color: var(--accent);
      box-shadow: var(--shadow);
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      opacity: 0.72;
      pointer-events: none;
      transform: translateX(-50%);
      animation: swipeHint 1.4s ease-in-out infinite;
    }
    [data-theme="dark"] .carousel-hint { background: rgba(255,255,255,0.10); }
    .story-carousel:not(.show-hint) .carousel-hint {
      opacity: 0;
      visibility: hidden;
    }
    @keyframes swipeHint {
      0%, 100% { transform: translate(-50%, 3px); }
      50% { transform: translate(-50%, -5px); }
    }
    .carousel-track {
      display: flex;
      flex-direction: column;
      transition: transform 0.28s ease;
      will-change: transform;
    }
    .carousel-slide {
      flex: 0 0 auto;
      width: 100%;
      padding: 18px 20px 20px;
      background: transparent;
    }
    [data-theme="dark"] .carousel-slide {
      background: transparent;
    }
    .carousel-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 0.72fr);
      gap: 18px;
      min-height: 300px;
      color: inherit;
      position: relative;
    }
    .carousel-card.no-img { grid-template-columns: 1fr; min-height: 0; }
    .carousel-number {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1;
      min-width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--paper);
      color: var(--accent);
      box-shadow: none;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      padding: 0 9px;
    }
    .carousel-img {
      grid-column: 2;
      grid-row: 1;
      width: 100%;
      height: 100%;
      min-height: 260px;
      max-height: 380px;
      border: 1px solid rgba(255,255,255,0.34);
      border-radius: 18px;
      object-fit: cover;
      filter: saturate(0.94) contrast(1.03);
      background: var(--lead-bg);
      box-shadow: none;
    }
    [data-theme="dark"] .carousel-img {
      border-color: rgba(255,255,255,0.10);
      box-shadow: none;
    }
    .carousel-copy {
      grid-column: 1;
      grid-row: 1;
      min-width: 0;
      align-self: center;
      padding: 4px 6px 4px 0;
    }
    .carousel-meta {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 8px;
    }
    .carousel-headline {
      font-family: var(--serif);
      font-size: clamp(26px, 3.4vw, 46px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--ink);
    }
    .carousel-summary {
      font-size: clamp(13px, 1.25vw, 15.5px);
      line-height: 1.65;
      color: var(--ink2);
      margin-top: 12px;
    }
    .carousel-sources {
      margin-top: 12px;
      font-size: 11px;
      color: var(--ink3);
    }
    /* ── LEAD CARD ── */
    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.28fr) minmax(0, 0.92fr);
      gap: 14px;
      align-items: stretch;
      margin-bottom: 14px;
    }
    .side-stack {
      display: grid;
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 14px;
      min-width: 0;
    }
    .lead-card {
      border-radius: 24px;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      min-height: 360px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .lead-card:hover,
    .lead-card:focus,
    .lead-card:focus-within {
      background: var(--hover);
      border-color: rgba(49,91,168,0.24);
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
    }
    .lead-img {
      width: 100%; height: 220px; object-fit: cover; display: block;
      flex-shrink: 0;
      background: var(--lead-bg);
      filter: saturate(0.96) contrast(1.03);
    }
    .lead-card.no-img .img-placeholder { display: flex; }
    .lead-body {
      padding: 16px 18px 18px;
      display: flex; flex-direction: column;
      flex: 1;
      min-width: 0;
    }
    .lead-meta {
      font-size: 10px; font-weight: 800; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 7px;
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .lead-readtime { color: var(--ink3); font-weight: 600; }
    .lead-readtime::before { content: "· "; color: var(--ink3); }
    .lead-headline {
      font-family: var(--serif);
      font-size: clamp(24px, 2.55vw, 36px);
      font-weight: 900; line-height: 1.06;
      letter-spacing: -0.035em; color: var(--ink);
    }

    /* ── CARD GRID (stories 4+) ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
      gap: 14px;
    }
    /* ── GRID HEADER ── */
    .grid-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 14px;
    }
    .grid-hdr-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink3);
      white-space: nowrap;
    }
    .grid-hdr-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .grid-hdr-count {
      font-size: 10px; font-weight: 600;
      color: var(--ink3); white-space: nowrap;
    }
    .below-news-hdr {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin: 0 0 16px;
      padding: 0 2px;
    }
    .below-news-hdr[hidden] { display: none; }
    .below-news-kicker {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .below-news-title {
      font-family: var(--serif);
      font-size: clamp(24px, 2.4vw, 34px);
      font-weight: 700;
      line-height: 1.1;
      color: var(--ink);
    }
    .below-news-count {
      color: var(--ink3);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── story teaser ── */
    .lead-teaser {
      font-size: 13px; line-height: 1.5; color: var(--ink2);
      margin-top: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .lead-sources {
      margin-top: 8px; font-size: 11px; color: var(--ink3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lead-source-link {
      color: var(--accent); font-weight: 600; text-decoration: none;
    }
    a.lead-source-link::after { content: " ↗"; opacity: 0.55; font-size: 9px; }
    a.lead-source-link:hover, a.lead-source-link:focus-visible { text-decoration: underline; }
    .card-topic {
      color: var(--accent); font-size: 9px; font-weight: 800;
      letter-spacing: 0.11em; text-transform: uppercase;
      margin-bottom: 7px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-summary {
      font-size: 12.5px; line-height: 1.48; color: var(--ink2);
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── CARDS ── */
    .news-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
      position: relative;
    }
    .news-card:hover,
    .news-card:focus,
    .news-card:focus-within {
      background: var(--hover);
      border-color: rgba(49,91,168,0.22);
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
    }
    .hero-grid .news-card { min-height: 0; }
    .side-stack .news-card { min-height: 158px; }
    .side-stack .card-img,
    .side-stack .img-placeholder,
    .side-stack .news-card.no-img .img-placeholder {
      height: 76px;
      min-height: 0;
    }
    .side-stack .card-text { padding: 8px 12px 10px; }
    .side-stack .card-topic { margin-bottom: 4px; }
    .side-stack .card-headline {
      font-size: 13.5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .side-stack .card-summary {
      display: -webkit-box;
      margin-top: 6px;
    }
    .news-card.no-img .img-placeholder { height: 156px; }
    .card-img {
      width: 100%;
      height: 156px;
      object-fit: cover;
      display: block;
      background: var(--lead-bg);
      filter: saturate(0.96) contrast(1.03);
    }
    .img-placeholder {
      width: 100%;
      height: 156px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--lead-bg);
      color: var(--tag-txt);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .lead-card .img-placeholder {
      width: 100%; height: 210px; min-height: 0; flex-shrink: 0;
    }

    .card-text {
      flex: 1;
      min-width: 0;
      padding: 14px 15px 15px;
      display: flex;
      flex-direction: column;
    }
    .card-headline {
      font-size: 14.75px; font-weight: 700;
      color: var(--ink); line-height: 1.24;
    }

    /* ── empty ── */
    .empty { padding: 48px 0; text-align: center; color: var(--ink3); }
    .empty-hed { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink2); margin-bottom: 5px; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: backdropIn 0.15s ease;
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--paper);
      border-radius: 16px;
      border: 1px solid var(--border);
      width: 100%; max-width: 640px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 18px 56px rgba(0,0,0,0.24);
      animation: modalIn 0.18s ease;
    }
    [data-theme="dark"] .modal { box-shadow: 0 20px 58px rgba(0,0,0,0.48); }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      width: 30px; height: 30px;
      background: var(--paper); border: 1px solid var(--border); border-radius: 50%;
      color: var(--ink2); font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .modal-close:hover { background: var(--hover); border-color: var(--ink3); color: var(--ink); }

    .modal-img {
      width: 100%; max-height: 70vh; object-fit: contain; display: block;
      background: #000;
    }
    /* With an image, keep the close button readable on top of the media. */
    .modal-has-img .modal-close { background: rgba(0,0,0,0.46); border-color: rgba(255,255,255,0.22); color: #fff; }

      var summaryStyle = getComputedStyle(summary);
      if(summaryStyle.display === "none") return;

      var lineHeight = parseFloat(summaryStyle.lineHeight) || 18;
      var textRect = text.getBoundingClientRect();
      var summaryRect = summary.getBoundingClientRect();
      var available = textRect.bottom - summaryRect.top - 1;
      var maxLines = Math.max(1, Math.floor(available / lineHeight));

      summary.style.setProperty("-webkit-line-clamp", String(maxLines));
    });

    leadCards.forEach(function(card){
      var teaser = card.querySelector(".lead-teaser");
      var body = card.querySelector(".lead-body");
      if(!teaser || !body) return;

      var teaserStyle = getComputedStyle(teaser);
      if(teaserStyle.display === "none") return;

      var lineHeight = parseFloat(teaserStyle.lineHeight) || 18;
      var bodyRect = body.getBoundingClientRect();
      var teaserRect = teaser.getBoundingClientRect();
      var afterTeaser = 1;
      var sources = card.querySelector(".lead-sources");
      if(sources) {
        var sourcesStyle = getComputedStyle(sources);
        afterTeaser += sources.getBoundingClientRect().height;
        afterTeaser += parseFloat(sourcesStyle.marginTop) || 0;
        afterTeaser += parseFloat(sourcesStyle.marginBottom) || 0;
      }
      var available = bodyRect.bottom - teaserRect.top - afterTeaser;
      var maxLines = Math.max(1, Math.floor(available / lineHeight));

      teaser.style.setProperty("-webkit-line-clamp", String(maxLines));
    });
  }
  function addBalancedGrid(grid){
    summaryGrids.push(grid);
    scheduleBalanceCards();
  }
  function scheduleBalanceCards(){
    if(balanceRaf) return;
    balanceRaf = requestAnimationFrame(function(){
      balanceRaf = 0;
      summaryGrids.forEach(balanceCardSummaries);
    });
  }
  /* ── background ── */
  function applyBg(){
    var pb=ed.preview_bg||{};
    var theme=document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    var themed = pb[theme];
    ["bg", "surface", "lead-bg", "ink", "ink2", "ink3", "accent", "border", "tag-bg", "tag-txt", "hover", "glow", "surface-hi", "surface-lo"].forEach(function(name){
      document.documentElement.style.removeProperty("--" + name);
    });
    if(!themed) return;
    if(typeof themed === "string") {
      document.documentElement.style.setProperty("--bg", themed);
      return;
    }
    Object.keys(themed).forEach(function(name){
      document.documentElement.style.setProperty("--" + name, themed[name]);
    });
  }
  applyBg();
  window.addEventListener("resize", scheduleBalanceCards);
  if(document.fonts && document.fonts.ready) document.fonts.ready.then(scheduleBalanceCards);

  /* ── MODAL ── */
  function openModal(story){
    var existing = document.querySelector(".modal-backdrop");
    if(existing) return;

    var headline = storyHeadline(story);
    var hasImg = !!(story.image && story.image.url);
    var previousFocus = document.activeElement;
    var previousOverflow = document.body.style.overflow;

    var backdrop = el("div","modal-backdrop");
    var modal    = el("div","modal" + (hasImg?" modal-has-img":""));
    var headlineId = "modal-headline-" + Date.now();
    modal.setAttribute("role","dialog");
    modal.setAttribute("aria-modal","true");
    modal.setAttribute("aria-labelledby", headlineId);

    /* close button */
    var closeBtn = el("button","modal-close","×");
    closeBtn.setAttribute("aria-label","Close");
    modal.appendChild(closeBtn);

    /* image */
    if(hasImg){
      modal.appendChild(makeImg(story.image.url, story.image.alt||headline, "modal-img"));
    }

    /* body */
    var body = el("div","modal-body");

    var topicEl = el("p","modal-topic");
    topicEl.textContent = topicFull(story);
    if(story.label) topicEl.appendChild(el("span",null," · "+story.label));
    body.appendChild(topicEl);

    var heading = el("h2","modal-headline", headline);
    heading.id = headlineId;
    body.appendChild(heading);
    if(story.summary) body.appendChild(el("p","modal-summary", story.summary));

    /* footer: sources + readtime */
    var footer = el("div","modal-footer");
    var srcs   = el("span","modal-sources");
    (story.sources||[]).forEach(function(src){
      if(!src.name) return;
      if(src.url){
        var a = el("a","source-link",src.name);
        a.href=src.url; a.target="_blank"; a.rel="noopener noreferrer";
        srcs.appendChild(a);
      } else {
        srcs.appendChild(el("span","source-link",src.name));
      }
    });
    footer.appendChild(srcs);
    if(story.read_time) footer.appendChild(el("span","readtime",story.read_time));
    body.appendChild(footer);

    modal.appendChild(body);
    backdrop.appendChild(modal);
    document.body.appendChild(backdrop);
    document.body.style.overflow="hidden";

    function close(){
      if(!backdrop.parentNode) return;
      backdrop.style.animation="backdropIn 0.12s ease reverse";
      modal.style.animation="modalIn 0.12s ease reverse";
      setTimeout(function(){
        if(backdrop.parentNode) backdrop.remove();
        document.body.style.overflow=previousOverflow;
        if(previousFocus && typeof previousFocus.focus==="function") previousFocus.focus();
      }, 110);
      document.removeEventListener("keydown",onKey);
    }
    function onKey(e){
      if(e.key==="Escape"){
        e.preventDefault();
        close();
        return;
      }
      if(e.key!=="Tab") return;

      var focusable = Array.prototype.slice.call(modal.querySelectorAll('a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])'));
      if(!focusable.length) return;
      var first = focusable[0];
      var last = focusable[focusable.length-1];
      if(e.shiftKey && document.activeElement===first){
        e.preventDefault();
        last.focus();
      } else if(!e.shiftKey && document.activeElement===last){
        e.preventDefault();
        first.focus();
      }
    }

    closeBtn.addEventListener("click", close);
    backdrop.addEventListener("click", function(e){ if(e.target===backdrop) close(); });
    document.addEventListener("keydown", onKey);

    setTimeout(function(){ closeBtn.focus(); }, 50);
  }

  /* ── render ── */
  var main = document.getElementById("main");
  var belowNewsHdr = document.getElementById("below-news-hdr");
  if(stories.length && belowNewsHdr){
    belowNewsHdr.hidden = false;
    document.getElementById("below-news-count").textContent = plural(stories.length, "story");
  }

  if(!stories.length){
    var empty=el("div","empty");
    empty.appendChild(el("p","empty-hed","Nothing today"));
    empty.appendChild(el("p",null,"No stories matched your topics."));
    main.appendChild(empty);
  }

  function makeStoryCard(story, options){
    options = options || {};
    var headline = storyHeadline(story);
    var imgUrl = story.image && story.image.url;
    var card = el("div", "news-card");
    card.setAttribute("role","button");
    card.setAttribute("tabindex","0");
    card.setAttribute("aria-label","Read: "+headline);

    if(imgUrl){
      var img = makeImg(imgUrl, story.image.alt||headline, "card-img");
      img.onerror = function(){
        card.className += " no-img";
        if(options.omitImagePlaceholder) this.remove();
        else this.replaceWith(el("div","img-placeholder","No image"));
      };
      card.appendChild(img);
    } else {
      card.className += " no-img";
      if(!options.omitImagePlaceholder) card.appendChild(el("div","img-placeholder","No image"));
    }

    var text = el("div","card-text");
    var topic = topicFull(story);
    if(topic) text.appendChild(el("p","card-topic",topic));
    text.appendChild(el("p","card-headline", headline));
    if(story.summary) text.appendChild(el("p","card-summary", story.summary));
    card.appendChild(text);

    card.addEventListener("click", function(){ openModal(story); });
    card.addEventListener("keydown", function(e){
      if((e.key==="Enter"||e.key===" ") && !e.repeat){
        e.preventDefault();
        openModal(story);
      }
    });
    return card;
  }

  function renderCarousel(){
    var carousel = document.getElementById("story-carousel");
    if(!stories.length || !carousel) return;

    carousel.hidden = false;

    var header = el("div", "carousel-hdr");
    var headerText = el("div");
    headerText.appendChild(el("p", "carousel-kicker", "Briefing stream"));
    headerText.appendChild(el("h2", "carousel-title", "Scan the edition"));
    headerText.appendChild(el("p", "carousel-instruction", "Swipe or scroll inside this panel; use the rail below to jump to a story."));
    header.appendChild(headerText);
    header.appendChild(el("span", "carousel-badge", plural(stories.length, "story")));
    carousel.appendChild(header);

    var windowEl = el("div", "carousel-window");
    var track = el("div", "carousel-track");
    var active = 0;
    var dots = [];
    windowEl.appendChild(track);
    carousel.appendChild(windowEl);

    stories.forEach(function(story, index){
      var headline = storyHeadline(story);
      var slide = el("article", "carousel-slide");
      slide.setAttribute("aria-label", "Story " + (index + 1) + ": " + headline);

      var card = el("div", "carousel-card");
      card.appendChild(el("span", "carousel-number", String(index + 1)));

      var imgUrl = story.image && story.image.url;
      if(imgUrl){
        var img = makeImg(imgUrl, story.image.alt || headline, "carousel-img");
        img.addEventListener("load", syncCarouselHeight);
        img.onerror = function(){ card.className += " no-img"; this.remove(); syncCarouselHeight(); };
        card.appendChild(img);
      } else {
        card.className += " no-img";
      }

      var copy = el("div", "carousel-copy");
      var topic = topicFull(story);
      if(topic) copy.appendChild(el("p", "carousel-meta", topic));
      copy.appendChild(el("h2", "carousel-headline", headline));
      if(story.summary) copy.appendChild(el("p", "carousel-summary", story.summary));
      if((story.sources || []).length){
        var sources = el("p", "carousel-sources");
        (story.sources || []).forEach(function(src){
          if(!src.name) return;
          if(sources.childNodes.length) sources.appendChild(document.createTextNode(", "));
          if(src.url){
            var a = el("a", "lead-source-link", src.name);
            a.href = src.url; a.target = "_blank"; a.rel = "noopener noreferrer";
            a.addEventListener("click", function(e){ e.stopPropagation(); });
            sources.appendChild(a);
          } else {
            sources.appendChild(document.createTextNode(src.name));
          }
        });
        if(sources.childNodes.length) copy.appendChild(sources);
      }
      card.appendChild(copy);

      slide.appendChild(card);
      track.appendChild(slide);
    });

    if(stories.length > 1){
      var progress = el("div", "carousel-progress");
      progress.setAttribute("aria-label", "Story shortcuts");
      stories.forEach(function(story, index){
        var dot = el("button", "carousel-dot");
        dot.type = "button";
        dot.setAttribute("aria-label", "Show story " + (index + 1) + ": " + storyHeadline(story));
        dot.addEventListener("click", function(){ showSlide(index); });
        progress.appendChild(dot);
        dots.push(dot);
      });
      carousel.appendChild(progress);
    }

    var carouselHeight = 0;
    function syncCarouselHeight(){
      Array.prototype.forEach.call(track.children, function(slide){
        slide.style.minHeight = "";
      });
      carouselHeight = Array.prototype.reduce.call(track.children, function(max, slide){
        return Math.max(max, slide.offsetHeight);
      }, 0);
      Array.prototype.forEach.call(track.children, function(slide){
        slide.style.minHeight = carouselHeight + "px";
      });
      showSlide(active);
    }

    function showSlide(index){
      active = (index + stories.length) % stories.length;
      var slide = track.children[active];
      if(!slide) return;
      windowEl.style.height = (carouselHeight || slide.offsetHeight) + "px";
      track.style.transform = "translateY(-" + slide.offsetTop + "px)";
      dots.forEach(function(dot, dotIndex){
        dot.setAttribute("aria-current", dotIndex === active ? "true" : "false");
      });
      carousel.classList.toggle("show-hint", active === 0 && stories.length > 1);
    }

    var touchStartX = null;
    var touchStartY = null;
    var touchMode = "";
    windowEl.addEventListener("touchstart", function(e){
      touchStartX = e.changedTouches[0].clientX;
      touchStartY = e.changedTouches[0].clientY;
      touchMode = "";
    }, { passive: true });
    windowEl.addEventListener("touchmove", function(e){
      if(touchStartY == null || stories.length <= 1) return;
      var dx = e.changedTouches[0].clientX - touchStartX;
      var dy = e.changedTouches[0].clientY - touchStartY;
      if(!touchMode && Math.max(Math.abs(dx), Math.abs(dy)) > 8){
        touchMode = Math.abs(dy) >= Math.abs(dx) ? "vertical" : "horizontal";
      }
      if(touchMode === "vertical") e.preventDefault();
    }, { passive: false });
    windowEl.addEventListener("touchend", function(e){
      if(touchStartY == null) return;
      var diff = e.changedTouches[0].clientY - touchStartY;
      var wasVertical = touchMode !== "horizontal";
      touchStartX = null;
      touchStartY = null;
      touchMode = "";
      if(!wasVertical || Math.abs(diff) < 40) return;
      showSlide(active + (diff < 0 ? 1 : -1));
    }, { passive: true });

    var wheelLocked = false;
    windowEl.addEventListener("wheel", function(e){
      if(Math.abs(e.deltaY) < 30) return;
      e.preventDefault();
      if(wheelLocked) return;
      wheelLocked = true;
      showSlide(active + (e.deltaY > 0 ? 1 : -1));
      setTimeout(function(){ wheelLocked = false; }, 360);
    }, { passive: false });

    if(stories.length > 1) carousel.appendChild(el("span", "carousel-hint", "↑"));

    window.addEventListener("resize", syncCarouselHeight);
    if(document.fonts && document.fonts.ready) document.fonts.ready.then(syncCarouselHeight);
    syncCarouselHeight();
  }

  renderCarousel();

  /* HERO GRID: lead spans two card spaces; stories 2 and 3 sit beside it. */
  if(stories.length){
    var heroGrid = el("div","hero-grid");
    var lead    = stories[0];
    var leadHeadline = storyHeadline(lead);
    var leadEl  = el("div","lead-card");
    leadEl.setAttribute("role","button");
    leadEl.setAttribute("tabindex","0");
    leadEl.setAttribute("aria-label","Read lead story: "+leadHeadline);

    var imgUrl = lead.image&&lead.image.url;
    if(imgUrl){
      var leadImg = makeImg(imgUrl, lead.image.alt||leadHeadline, "lead-img");
      leadImg.onerror = function(){ leadEl.className += " no-img"; this.remove(); };
      leadEl.appendChild(leadImg);
    } else {
      leadEl.className += " no-img";
    }

    var leadBody = el("div","lead-body");
    var leadMeta = el("p","lead-meta");
    leadMeta.appendChild(el("span",null,lead.label||"Lead story"));
    if(lead.read_time) leadMeta.appendChild(el("span","lead-readtime",lead.read_time));
    leadBody.appendChild(leadMeta);
    leadBody.appendChild(el("p","lead-headline", leadHeadline));
    if(lead.summary){
      leadBody.appendChild(el("p","lead-teaser", lead.summary));
    }
    if((lead.sources||[]).length){
      var leadSources = el("p","lead-sources");
      (lead.sources||[]).forEach(function(src){
        if(!src.name) return;
        if(leadSources.childNodes.length) leadSources.appendChild(document.createTextNode(", "));
        if(src.url){
          var a = el("a","lead-source-link",src.name);
          a.href=src.url; a.target="_blank"; a.rel="noopener noreferrer";
          a.addEventListener("click", function(e){ e.stopPropagation(); });
          leadSources.appendChild(a);
        } else {
          leadSources.appendChild(el("span","lead-source-link",src.name));
        }
      });
      if(leadSources.childNodes.length) leadBody.appendChild(leadSources);
    }

    leadEl.appendChild(leadBody);
    leadEl.addEventListener("click", function(){ openModal(lead); });
    leadEl.addEventListener("keydown", function(e){
      if((e.key==="Enter"||e.key===" ") && !e.repeat){
        e.preventDefault();
        openModal(lead);
      }
    });
    heroGrid.appendChild(leadEl);
    if(stories.length>1){
      var sideStack = el("div","side-stack");
      stories.slice(1,3).forEach(function(story, i){
        sideStack.appendChild(makeStoryCard(story, { omitImagePlaceholder: true }));
      });
      heroGrid.appendChild(sideStack);
    }
    main.appendChild(heroGrid);
    addBalancedGrid(heroGrid);
  }

  /* CARD GRID (stories 4+) */
  if(stories.length>3){
    /* section header */
    var gHdr = el("div","grid-hdr");
    gHdr.appendChild(el("span","grid-hdr-label","More stories"));
    gHdr.appendChild(el("span","grid-hdr-line"));
    gHdr.appendChild(el("span","grid-hdr-count",plural(stories.length-3,"story")));
    main.appendChild(gHdr);

    var grid = el("div","card-grid");
    stories.slice(3).forEach(function(story, i){
      grid.appendChild(makeStoryCard(story));
    });
    main.appendChild(grid);
    addBalancedGrid(grid);
  }

  /* ── EXTRAS ── */
  function appendExtraSection(parent,title,items,type,moreUrl){
    var section=el("section","extras-section");
    var header=el("div","extras-section-hdr");
    header.appendChild(el("p","extras-kicker",title));
    if(moreUrl){
      var more=el("a","extras-more","More");
      more.href=moreUrl; more.target="_blank"; more.rel="noopener noreferrer";
      header.appendChild(more);
    }
    section.appendChild(header);

    var grid=el("div","extras-grid");
    (items||[]).forEach(function(item){
      var card=el("a","extra-card");
      card.href=item.url||"#"; card.target="_blank"; card.rel="noopener noreferrer";
      var itemName = item.name || "Untitled";
      var itemRank = item.rank ? "#" + item.rank + " " : "";
      if(item.image_url) card.appendChild(makeImg(item.image_url,itemName,"extra-img"));
      var body=el("div","extra-body");
      body.appendChild(el("span","extra-link",itemRank+itemName));
      var desc=item.tagline||item.description;
      if(desc) body.appendChild(el("p","extra-desc",desc));
      var meta=type==="product"
        ?(plural(item.votes_count||0,"vote")+(item.comments_count?" · "+plural(item.comments_count,"comment"):""))
        :([item.language,item.stars_today].filter(Boolean).join(" · "));
      if(meta) body.appendChild(el("p","extra-meta",meta));
      card.appendChild(body);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    parent.appendChild(section);
  }

  var extrasEl = document.getElementById("extras");
  var products = extras.product_hunt   ||[];
  var repos    = extras.github_trending||[];
  if(products.length||repos.length){
    extrasEl.appendChild(el("h2","extras-title","Extras"));
    if(products.length) appendExtraSection(extrasEl,"Product Hunt Yesterday Top 5",products,"product",extras.product_hunt_more_url);
    if(repos.length)    appendExtraSection(extrasEl,"GitHub Trending Top 3",repos,"repo",extras.github_trending_more_url||"https://github.com/trending");
  } else {
    document.getElementById("content-grid").classList.add("no-extras");
    extrasEl.remove();
  }

  /* ── theme ── */
  var btn=document.getElementById("theme-btn");
  function getTheme(){
    return document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  }
  function applyTheme(t){
    document.documentElement.dataset.theme=t;
    btn.textContent=t==="dark"?"Light":"Dark";
    try{localStorage.setItem("nl-theme",t);}catch(e){}
    applyBg();
  }
  applyTheme(getTheme());
  btn.addEventListener("click",function(){applyTheme(getTheme()==="dark"?"light":"dark");});
}());
</script>
</body>
