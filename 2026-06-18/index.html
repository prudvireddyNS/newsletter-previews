<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletter Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script>try{var t=localStorage.getItem("nl-theme");if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
  <style>
    :root {
      --bg:      #F8F7F4;
      --surface: #FFFFFF;
      --lead-bg: #AFA088;
      --ink:     #131311;
      --ink2:    #3D3D3B;
      --ink3:    #8A8782;
      --accent:  #4B6BFB;
      --border:  #BBAE98;
      --tag-bg:  #EAECFF;
      --tag-txt: #3B5BDB;
      --hover:   #F3F2EF;
      --shadow:  0 1px 2px rgba(36,28,18,0.10), 0 8px 24px rgba(36,28,18,0.10);
      --serif:   'Merriweather', Georgia, serif;
      --sans:    'Inter', system-ui, -apple-system, sans-serif;
      --r:       11px;
    }
    [data-theme="dark"] {
      --bg:      #0E0D0C;
      --surface: #1C1A18;
      --lead-bg: #10112A;
      --ink:     #EDEAE0;
      --ink2:    #C4C1BC;
      --ink3:    #6A6864;
      --accent:  #8097FF;
      --border:  #2A2825;
      --tag-bg:  #141628;
      --tag-txt: #99AAFF;
      --hover:   #222019;
      --shadow:  0 1px 3px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--accent); color: #fff; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    body {
      background: var(--lead-bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    /* ── layout ── */
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 18px 56px; }
    .content-grid {
      display: grid;
      grid-template-columns: 256px minmax(0,1fr);
      gap: 20px;
      align-items: start;
    }
    .news-col { min-width: 0; }

    /* ── masthead ── */
    .mast {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .mast-left { min-width: 0; }
    .mast-kicker {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink3); margin-bottom: 6px;
    }
    .mast-kicker-accent { color: var(--accent); font-weight: 600; }
    .mast-title {
      font-family: var(--serif);
      font-size: clamp(22px, 4vw, 42px);
      font-weight: 700; line-height: 1.08;
      letter-spacing: -0.02em; color: var(--ink); margin-bottom: 10px;
    }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 600; letter-spacing: 0.07em;
      text-transform: uppercase; background: var(--tag-bg);
      color: var(--tag-txt); border-radius: 4px; padding: 3px 8px;
    }
    .mast-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 6px; flex-shrink: 0;
    }
    .theme-btn {
      font-family: var(--sans); font-size: 11px; font-weight: 600;
      color: var(--ink2); background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 11px; cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    .theme-btn:hover { color: var(--ink); border-color: var(--ink3); }
    .mast-sub { font-size: 11px; color: var(--ink3); text-align: right; }

    /* ── LEAD CARD ── */
    .lead-card {
      border-radius: var(--r);
      overflow: hidden;
      background: var(--surface);
      border: 1px solid rgba(80,68,50,0.16);
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      display: flex;
      min-height: 150px;
    }
    .lead-img {
      width: 42%; min-height: 150px; object-fit: cover; display: block;
      flex-shrink: 0;
    }
    .lead-body {
      padding: 14px 16px;
      display: flex; flex-direction: column; justify-content: center;
      min-width: 0;
    }
    .lead-meta {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
      display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
    }
    .lead-readtime { color: var(--ink3); font-weight: 600; }
    .lead-readtime::before { content: "· "; color: var(--ink3); }
    .lead-headline {
      font-family: var(--serif);
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 700; line-height: 1.25;
      letter-spacing: -0.015em; color: var(--ink);
    }

    /* ── CARD GRID (stories 1+) ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    /* ── GRID HEADER ── */
    .grid-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 10px;
    }
    .grid-hdr-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink3);
      white-space: nowrap;
    }
    .grid-hdr-line {
      flex: 1; height: 1px; background: var(--border);
    }
    .grid-hdr-count {
      font-size: 10px; font-weight: 600;
      color: var(--ink3); white-space: nowrap;
    }

    /* ── story teaser ── */
    .lead-teaser {
      font-size: 12px; line-height: 1.5; color: var(--ink2);
      margin-top: 5px;
    }
    .lead-sources {
      margin-top: 8px; font-size: 11px; color: var(--ink3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .lead-source-link {
      color: var(--accent); font-weight: 600; text-decoration: none;
    }
    .lead-source-link::after { content: " ↗"; opacity: 0.55; font-size: 9px; }
    .lead-source-link:hover { text-decoration: underline; }
    .card-summary {
      font-size: 12px; line-height: 1.5; color: var(--ink2);
      margin-top: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── CARDS ── */
    .news-card {
      background: var(--surface);
      border: 1px solid rgba(80,68,50,0.16);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .news-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    [data-theme="dark"] .news-card:hover { box-shadow: 0 5px 20px rgba(0,0,0,0.4); }

    .card-img {
      width: 100%;
      height: 118px;
      object-fit: cover;
      display: block;
      background: var(--lead-bg);
    }
    .img-placeholder {
      width: 100%;
      height: 118px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 22% 20%, rgba(75,107,251,0.18), transparent 28%),
        linear-gradient(135deg, var(--tag-bg), var(--lead-bg));
      color: var(--tag-txt);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .lead-card .img-placeholder {
      width: 42%; height: auto; min-height: 150px; flex-shrink: 0;
    }

    .card-text {
      flex: 1;
      min-width: 0;
      padding: 11px 13px 12px;
      display: flex;
      flex-direction: column;
    }
    .card-headline {
      font-size: 13.5px; font-weight: 700;
      color: var(--ink); line-height: 1.35;
    }

    /* ── empty ── */
    .empty { padding: 48px 0; text-align: center; color: var(--ink3); }
    .empty-hed { font-family: var(--serif); font-size: 20px; font-weight: 700; color: var(--ink2); margin-bottom: 5px; }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: backdropIn 0.15s ease;
    }
    @keyframes backdropIn { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%; max-width: 580px;
      max-height: 88vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: modalIn 0.18s ease;
    }
    [data-theme="dark"] .modal { box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .modal-close {
      position: sticky; top: 12px;
      float: right; margin: 12px 12px 0 0;
      width: 28px; height: 28px;
      background: var(--border); border: none; border-radius: 50%;
      color: var(--ink2); font-size: 16px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0; z-index: 1;
    }
    .modal-close:hover { background: var(--ink3); color: #fff; }

    .modal-img {
      width: 100%; max-height: 70vh; object-fit: contain; display: block;
      background: #000;
      /* sits at top of modal, under the close btn row */
      margin-top: -28px; /* pull up behind close btn area */
    }
    /* when there's an image, add top padding to body so close btn is above image */
    .modal-has-img .modal-img { margin-top: 0; }
    .modal-has-img .modal-close { position: absolute; background: rgba(0,0,0,0.4); color: #fff; }
    .modal-has-img .modal-close:hover { background: rgba(0,0,0,0.7); }

    .modal-body { padding: 16px 20px 20px; }
    .modal-topic {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 8px;
    }
    .modal-headline {
      font-family: var(--serif);
      font-size: clamp(18px, 3vw, 26px);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em; color: var(--ink);
      margin-bottom: 12px;
    }
    .modal-summary {
      font-family: var(--serif);
      font-size: 14.5px; line-height: 1.85; color: var(--ink2);
    }
    .modal-footer {
      display: flex; align-items: center; flex-wrap: wrap;
      gap: 5px 10px;
      padding-top: 12px; border-top: 1px solid var(--border);
      margin-top: 14px;
    }
    .modal-sources { display: flex; gap: 7px; flex-wrap: wrap; flex: 1; }
    .source-link {
      font-size: 11px; font-weight: 600; color: var(--accent);
      text-decoration: none; white-space: nowrap;
    }
    .source-link::after { content: " ↗"; opacity: 0.55; font-size: 9px; }
    .source-link:hover { text-decoration: underline; }
    .readtime { font-size: 11px; color: var(--ink3); white-space: nowrap; }

    /* ── EXTRAS sidebar ── */
    .extras { min-width: 0; }
    .extras-title { font-family: var(--serif); font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .extras-grid { display: grid; grid-template-columns: 1fr; gap: 7px; }
    .extras-section + .extras-section { margin-top: 18px; }
    .extras-section-hdr {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; margin-bottom: 7px;
    }
    .extra-card {
      background: var(--surface); border: 1px solid rgba(80,68,50,0.16);
      border-radius: var(--r);
      padding: 10px; display: flex; align-items: flex-start;
      gap: 9px; box-shadow: var(--shadow); color: inherit;
      text-decoration: none;
    }
    .extra-card:hover .extra-link { text-decoration: underline; }
    .extras-kicker {
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink3);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .extra-body { min-width: 0; }
    .extra-link {
      color: var(--ink); font-size: 12px; line-height: 1.3;
      text-decoration: none; font-weight: 600;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .extra-img {
      width: 40px; height: 40px; object-fit: cover;
      border-radius: 8px; display: block; background: var(--lead-bg); flex-shrink: 0;
    }
    .extra-desc {
      color: var(--ink2); font-size: 11px; line-height: 1.4; margin-top: 2px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .extra-meta {
      color: var(--ink3); font-size: 10.5px; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .extras-more {
      color: var(--accent); font-size: 11px;
      font-weight: 600; text-decoration: none; white-space: nowrap;
    }
    .extras-more::after { content: " ↗"; opacity: 0.6; font-size: 9px; }
    .extras-more:hover { text-decoration: underline; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .content-grid { grid-template-columns: 1fr; }
      .extras { order: 2; margin-top: 24px; }
      .news-col { order: 1; }
      .extras-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    }
    @media (max-width: 540px) {
      .wrap { padding: 16px 13px 44px; }
      .mast { flex-direction: column; gap: 8px; margin-bottom: 18px; }
      .mast-right { flex-direction: row; align-items: center; }
      .mast-sub { text-align: left; }
      .lead-card { flex-direction: column; min-height: 0; }
      .lead-img, .lead-card .img-placeholder {
        width: 100%; height: 125px; min-height: 0;
      }
      .card-grid { grid-template-columns: 1fr; }
      .modal { max-height: 92vh; border-radius: 14px; }
      .extras-grid { grid-template-columns: 1fr; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, .modal, .modal-backdrop { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header class="mast">
    <div class="mast-left">
      <p class="mast-kicker" id="mast-kicker"></p>
      <h1 class="mast-title" id="mast-title"></h1>
      <div class="tags" id="tags"></div>
    </div>
    <div class="mast-right">
      <button class="theme-btn" id="theme-btn" type="button">Dark</button>
      <p class="mast-sub" id="mast-sub"></p>

  <div class="content-grid">
    <aside class="extras" id="extras" aria-label="Extras"></aside>
    <main class="news-col" id="main" aria-label="Today's stories"></main>
  </div>

</div>

4-mastra-npm-packages-compromised-via.html", "topic": "AI LLM Tooling"}, {"name": "TheHackerNews", "url": "https://thehackernews.com/2026/06/malicious-jetbrains-plugins-steal-ai.html", "topic": "AI Coding Tools"}], "image": {"url": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiKLWn0zHFuJ8rkb2bqILIyAGxt_-VJ13Ytmv1TRWtGJkI6Rva5Oag5LdLasE2rmenokuRvoEI2wH0Ayfe_P4_5q1Qc5FQ2MrQgUHrgD9wY6DTlYugAtj8CP7Fh0OPjKkU5LbeRKWvPEh0Ol0CmLTe4QVayeZiNlVFvU7MO5tWl-b8Lbn80hKd45q9Z1yOd/s1600/npms.jpg", "alt": "npm package security graphic"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling", "AI Coding Tools"], "topic": "AI LLM Tooling"}, {"number": "03", "headline": "Open coding models are becoming swappable backends", "summary": "GLM-5.2 from Z-AI is getting attention as an MIT-licensed MoE coding and agent model with about 743B total parameters, 39B active parameters, 1M context, BF16/native-FP8 checkpoints, and vLLM/SGLang deployment recipes for 8xH200/H20 and 8xB200 setups. The more practical shift is that Codex App, CLI, and SDK can be pointed at non-OpenAI providers, and Ollama is already pitching GLM-5.2 and Kimi-K2.7-Code as launchable Codex backends.", "sources": [{"name": "X", "url": "https://x.com/BrianRoemmele/status/2067344987248087302", "topic": "AI Startups & Open Source"}, {"name": "X", "url": "https://x.com/nutlope/status/2067313679951941686", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/thsottiaux/status/2067181377028538431", "topic": "AI Coding Tools"}, {"name": "X", "url": "https://x.com/ollama/status/2067307179066224833", "topic": "AI Coding Tools"}], "image": {"url": "https://pbs.twimg.com/media/HLCvTwTbMAEkN0F.jpg", "alt": "GLM-5.2 model release graphic"}, "label": null, "read_time": null, "topics": ["AI Startups & Open Source", "AI Coding Tools"], "topic": "AI Startups & Open Source"}, {"number": "04", "headline": "Databricks turns coding agents into a team sport", "summary": "Databricks open-sourced Omnigent, a live-session harness for running Claude Code, Codex, Cursor, Pi, and custom agents side by side. I like this because it treats coding agents less like one magic assistant and more like a coordinated toolbench where multiple agents can compete, collaborate, and leave auditable work.", "sources": [{"name": "X", "url": "https://x.com/Yuchenj_UW/status/2067273020352380950", "topic": "AI Coding Tools"}], "image": {"url": "https://pbs.twimg.com/media/HLBllPbbIAAXJ-X.jpg", "alt": "Omnigent multi-agent coding harness screenshot"}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "05", "headline": "HumanLayer packages agentic development for teams", "summary": "HumanLayer opened access to its agentic IDE and collaboration platform, built around task workspaces, agent sessions, artifacts, local/cloud daemons, BYO Claude/Codex keys, and its Research-Plan-Implement workflow. The pitch is aimed at staff-level teams fighting AI slop in million-line codebases: more orchestration and design review, not just faster PR generation.", "sources": [{"name": "X", "url": "https://x.com/dexhorthy/status/2067286892786454855", "topic": "AI Coding Tools"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "06", "headline": "QUEST open-sources a frontier-ish research-agent recipe", "summary": "QUEST is an open deep-research-agent release from OSU and Amazon with 2B–35B models, 8K synthetic samples, 32 H100s, and a recipe spanning mid-training, SFT, and RL. The useful bits are operational: session-level 32K training, a cache that reached about 40% hit rate, and a reminder that agentic RL fails on infrastructure bugs long before it fails on clever loss functions.", "sources": [{"name": "X", "url": "https://x.com/ysu_nlp/status/2067380438134624742", "topic": "AI Agents & Agentic Frameworks"}, {"name": "X", "url": "https://x.com/jianxie_/status/2067383902696792178", "topic": "AI Agents & Agentic Frameworks"}, {"name": "X", "url": "https://x.com/jianxie_/status/2067446359347892325", "topic": "AI Agents & Agentic Frameworks"}], "image": {"url": "https://pbs.twimg.com/media/HLDGiGHboAAJR5b.jpg", "alt": "QUEST deep research agent benchmark figure"}, "label": null, "read_time": null, "topics": ["AI Agents & Agentic Frameworks"], "topic": "AI Agents & Agentic Frameworks"}, {"number": "07", "headline": "OpenAI hires a transformer-era architect", "summary": "Noam Shazeer says he is leaving Google for OpenAI, and Mark Chen says he will lead architecture research there. Given Shazeer’s fingerprints on Transformers, MoE, and efficient decoding, this is one of those talent moves that may matter more than a minor model release.", "sources": [{"name": "X", "url": "https://x.com/NoamShazeer/status/2067400851438932297", "topic": "Frontier Labs"}, {"name": "X", "url": "https://x.com/markchen90/status/2067402457500758375", "topic": "Frontier Labs"}, {"name": "X", "url": "https://x.com/Cointelegraph/status/2067427112567423366", "topic": "Frontier Labs"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["Frontier Labs"], "topic": "Frontier Labs"}, {"number": "08", "headline": "Grok lands behind the Bedrock API", "summary": "xAI made Grok 4.3 available on Amazon Bedrock, putting another frontier-ish model behind AWS’s enterprise inference and access-control layer. For builders, the important part is less the branding and more that Bedrock keeps becoming a model router for teams that want tool calling, governance, and procurement in one place.", "sources": [{"name": "X", "url": "https://x.com/xai/status/2067263498359624012", "topic": "AI LLM Tooling"}], "image": {"url": "https://pbs.twimg.com/media/HLBj9qxbQAEOx1K.jpg", "alt": "Grok on Amazon Bedrock announcement graphic"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "09", "headline": "Anthropic’s model blackout becomes a sovereignty warning", "summary": "Anthropic’s Fable 5 and Mythos 5 remain caught in a U.S. export-control directive, and G7 leaders are now openly worrying that American model access can disappear overnight. The Ars and TechCrunch coverage frames the core production risk well: model capability, compliance, and geopolitics are now part of uptime planning for any company building on closed frontier APIs.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/17/world-leaders-want-american-ai-they-just-dont-want-america-to-be-able-to-turn-it-off/", "topic": "Frontier Labs"}, {"name": "Ars Technica", "url": "https://arstechnica.com/ai/2026/06/dangerous-ai-models-are-coming-no-matter-what/", "topic": "Frontier Labs"}, {"name": "X", "url": "https://x.com/DeepNodeAI/status/2067468921524171124", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/GettyImages-2281424015.jpg?w=1024", "alt": "G7 leaders discussing AI access and sovereignty"}, "label": null, "read_time": null, "topics": ["Frontier Labs", "AI Infra / Inference / Hardware"], "topic": "Frontier Labs"}, {"number": "10", "headline": "OpenAI adds a harder life-sciences eval", "summary": "OpenAI released LifeSciBench, an evaluation built with 173 biotech and pharma scientists across 750 expert-authored tasks and seven biological research workflows. I’m filing this under useful eval work because domain-specific benchmarks with real practitioners are much closer to deployment readiness than another leaderboard puzzle set.", "sources": [{"name": "X", "url": "https://x.com/OpenAI/status/2067346916929937827", "topic": "AI LLM Tooling"}], "image": {"url": "https://pbs.twimg.com/media/HLCs-hgaUAAuUAP.jpg", "alt": "LifeSciBench benchmark announcement image"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "11", "headline": "Agent skills get cheaper and more callable", "summary": "Matt Pocock shipped v1 of his skills repo with a reported 63% token-cost reduction for skill descriptions and a split between model-invocable and user-invocable skills. The interesting pattern is skill routing: /ask-matt, /codebase-design, /domain-modeling, and /diagnosing-bugs point toward reusable agent capabilities as first-class project assets.", "sources": [{"name": "X", "url": "https://x.com/mattpocockuk/status/2067259590488510471", "topic": "LLM OS / MCP Ecosystem"}], "image": {"url": "https://pbs.twimg.com/media/HLBhYbMXAAA9NGk.png", "alt": "skills v1 repository announcement screenshot"}, "label": null, "read_time": null, "topics": ["LLM OS / MCP Ecosystem"], "topic": "LLM OS / MCP Ecosystem"}, {"number": "12", "headline": "Formal methods move into the LLM reliability layer", "summary": "Pramaana Labs raised a $27M seed led by Khosla to apply formal verification patterns to LLM systems in high-stakes domains like law, tax, cybersecurity, and drug discovery. Its architecture keeps a conventional LLM for language and problem solving but adds a LEAN-style deterministic verification layer, which is exactly the kind of hybrid reliability stack enterprises keep asking for.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/17/pramaana-labs-raises-27-million-seed-round-from-khosla-ventures-to-bring-formal-verification-to-ai/", "topic": "AI LLM Tooling"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/Screenshot-2026-06-17-at-9.53.46-AM.jpg?resize=1200,560", "alt": "Pramaana Labs formal verification diagram"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling"], "topic": "AI LLM Tooling"}, {"number": "13", "headline": "Physical AI is getting a real stack", "summary": "Physical AI had a dense day: NVIDIA’s ENPIRE thread describes eight Codex agents running a robot fleet with hard safety limits, frozen visual reward classifiers, and MRU/MTU telemetry, while XDOF emerged with $70M, 20 customers, and an ABC release of 130K robot manipulation trajectories plus simulation/eval data. In parallel, Odyssey raised $310M at a $1.45B valuation for interactive world models optimized for AWS Trainium, and Aether raised $20M to build causal world models for physical reasoning and scientific intervention.", "sources": [{"name": "X", "url": "https://x.com/DrJimFan/status/2067283904986517866", "topic": "AI Agents & Agentic Frameworks"}, {"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/17/collecting-robot-training-data-is-dirty-unglamorous-work-some-ai-labs-are-already-paying-xdof-to-do-it/", "topic": "Multimodal AI"}, {"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/17/world-model-maker-odyssey-nabs-1-45b-valuation-backed-by-amazon-and-other-big-names/", "topic": "Multimodal AI"}, {"name": "X", "url": "https://x.com/AetherLab_AI/status/2067410716941045819", "topic": "AI Startups & Open Source"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/DSC_2479.jpg?resize=1200,800", "alt": "Robot data collection setup"}, "label": null, "read_time": null, "topics": ["AI Agents & Agentic Frameworks", "Multimodal AI", "AI Startups & Open Source"], "topic": "AI Agents & Agentic Frameworks"}, {"number": "14", "headline": "Inference is turning into a power game", "summary": "AI infrastructure is looking increasingly constrained by power and deployment speed: Nebius closed its Eigen AI acquisition to strengthen inference, post-training, and optimization, while Jefferies/JPMorgan-sourced pipeline commentary says large shares of announced 2026–2028 data centers still have not broken ground and face transformer/interconnection delays. India is pulling in capital too, with CPP committing up to about $741M to CtrlS, which reinforces the same point: usable, powered inference capacity is becoming a strategic asset, not a commodity.", "sources": [{"name": "X", "url": "https://x.com/hanrui_w/status/2067327865545486686", "topic": "AI Infra / Inference / Hardware"}, {"name": "X", "url": "https://x.com/MilkRoadAI/status/2067335480178610285", "topic": "AI Infra / Inference / Hardware"}, {"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/17/canadian-pension-giant-joins-race-to-fund-indias-ai-fueled-data-center-boom/", "topic": "AI Infra / Inference / Hardware"}], "image": {"url": "https://pbs.twimg.com/media/HLCmqUra0AE0mm7.png", "alt": "AI data center capacity pipeline chart"}, "label": null, "read_time": null, "topics": ["AI Infra / Inference / Hardware"], "topic": "AI Infra / Inference / Hardware"}, {"number": "15", "headline": "Claude tightens the design-to-code loop", "summary": "Claude Design picked up more productized design-system behavior: brand consistency across projects, direct canvas edits, Claude Code sync, and more tool connections. It’s not a model release, but it matters because design-to-code loops are only useful if the agent can respect the team’s components and hand work back to the engineering environment.", "sources": [{"name": "X", "url": "https://x.com/claudeai/status/2067325887909884315", "topic": "AI Coding Tools"}], "image": {"url": "https://pbs.twimg.com/media/HLCU9x3XgAArrnJ.jpg", "alt": "Claude Design interface update image"}, "label": null, "read_time": null, "topics": ["AI Coding Tools"], "topic": "AI Coding Tools"}, {"number": "16", "headline": "PaddleOCR gets easier to deploy everywhere", "summary": "PaddleOCR 3.7 added ONNX Runtime as a switchable backend with CPU acceleration through OpenVINO and GPU paths through CUDA and TensorRT. PP-OCRv6 Tiny/Small/Medium are also onboard, with Paddle claiming up to 3.9x faster CPU inference, which is nice for OCR pipelines that need to run from servers to edge boxes.", "sources": [{"name": "X", "url": "https://x.com/PaddlePaddle/status/2067184957844488314", "topic": "Multimodal AI"}], "image": {"url": "https://pbs.twimg.com/media/HLAa_aAboAARpEj.jpg", "alt": "PaddleOCR 3.7 ONNX Runtime announcement graphic"}, "label": null, "read_time": null, "topics": ["Multimodal AI"], "topic": "Multimodal AI"}, {"number": "17", "headline": "DeepL buys its way into live translation", "summary": "DeepL acquired Mixhalo, a live-event audio streaming startup, to push its voice translation stack into conferences, sports, and other noisy real-world venues. DeepL already had voice-to-text and voice-to-voice translation, but Mixhalo gives it the application layer and Bay Area presence to sell real-time multilingual audio experiences.", "sources": [{"name": "TechCrunch", "url": "https://techcrunch.com/2026/06/17/deepl-acquires-mixhalo-for-live-event-audio-streaming-and-translation/", "topic": "Multimodal AI"}], "image": {"url": "https://techcrunch.com/wp-content/uploads/2026/06/Mixhalo-Billboard-2-1200x627-2.jpeg?resize=1200,675", "alt": "Mixhalo live audio translation billboard"}, "label": null, "read_time": null, "topics": ["Multimodal AI"], "topic": "Multimodal AI"}], "extras": {"product_hunt": [{"rank": 1, "name": "Framer 3.0", "tagline": "With Agents, Branching, Community, and an all-new design", "url": "https://www.producthunt.com/products/framer?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 462, "comments_count": 20, "image_url": "https://ph-files.imgix.net/f3557b68-8d59-4347-9646-d0a5eac2a333.png?auto=format"}, {"rank": 2, "name": "Swytchcode CLI", "tagline": "Give agents reliable access to 2,000+ APIs w/ durable state", "url": "https://www.producthunt.com/products/swytchcode?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 380, "comments_count": 60, "image_url": "https://ph-files.imgix.net/34d8f65f-417b-412c-8068-2567903f0814.png?auto=format"}, {"rank": 3, "name": "Daemons by Charlie Labs", "tagline": "Keep PRs, issues, CI, and docs moving with AI agents", "url": "https://www.producthunt.com/products/daemons-by-charlie-labs?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 228, "comments_count": 36, "image_url": "https://ph-files.imgix.net/74ad0cea-ee15-4544-929b-52ffe9210d3f.png?auto=format"}, {"rank": 4, "name": "Quartz", "tagline": "AI email client built for focus. Runs locally on your Mac", "url": "https://www.producthunt.com/products/quartz-3?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 222, "comments_count": 62, "image_url": "https://ph-files.imgix.net/f3f6c9ae-a0fe-402c-9d9b-d6b0dacb2864.png?auto=format"}, {"rank": 5, "name": "Android 17", "tagline": "Android becomes an intelligence system", "url": "https://www.producthunt.com/products/android?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 188, "comments_count": 5, "image_url": "https://ph-files.imgix.net/e1d8219b-7908-4651-8e8c-dc1c815de6cd.png?auto=format"}], "product_hunt_more_url": "https://www.producthunt.com/leaderboard/daily/2026/6/17", "github_trending": [{"rank": 1, "name": "DeusData/codebase-memory-mcp", "description": "High-performance code intelligence MCP server. Indexes codebases into a persistent knowledge graph — average repo in milliseconds. 158 languages, sub-ms queries, 99% fewer tokens. Single static binary, zero dependencies.", "url": "https://github.com/DeusData/codebase-memory-mcp", "image_url": "https://opengraph.githubassets.com/1/DeusData/codebase-memory-mcp", "language": "C", "stars": "5,913", "stars_today": "371 stars today"}, {"rank": 2, "name": "n0-computer/iroh", "description": "IP addresses break, dial keys instead. Modular networking stack in Rust.", "url": "https://github.com/n0-computer/iroh", "image_url": "https://opengraph.githubassets.com/1/n0-computer/iroh", "language": "Rust", "stars": "9,746", "stars_today": "421 stars today"}, {"rank": 3, "name": "Panniantong/Agent-Reach", "description": "Give your AI agent eyes to see the entire internet. Read & search Twitter, Reddit, YouTube, GitHub, Bilibili, XiaoHongShu — one CLI, zero API fees.", "url": "https://github.com/Panniantong/Agent-Reach", "image_url": "https://opengraph.githubassets.com/1/Panniantong/Agent-Reach", "language": "Python", "stars": "33,609", "stars_today": "1,161 stars today"}]}, "preview_bg": {"light": "#F3F0FF", "dark": "#1A1430"}}</script>
<script>
(function () {
  var ed      = JSON.parse(document.getElementById("ed").textContent);
  var stories = ed.stories || [];
  var extras  = ed.extras  || {};

  /* ── masthead ── */
  var kickerEl = document.getElementById("mast-kicker");
  if (ed.persona) {
    kickerEl.innerHTML = (ed.date||"") + ' &middot; <span class="mast-kicker-accent">' + ed.persona + '</span>';
  } else {
    kickerEl.textContent = ed.date || "";
  }
  document.getElementById("mast-title").textContent = ed.issue_title || (stories.length + " stories");
  document.getElementById("mast-sub").textContent   = ed.email || "";
  (ed.tags||[]).forEach(function(t){
    var s = document.createElement("span"); s.className="tag"; s.textContent=t;
    document.getElementById("tags").appendChild(s);
  });

  /* ── helpers ── */
  function el(tag,cls,text){
    var n=document.createElement(tag);
    if(cls) n.className=cls;
    if(text!=null) n.textContent=text;
    return n;
  }
  function makeImg(url,alt,cls){
    var img=document.createElement("img");
    img.className=cls; img.src=url; img.alt=alt||""; img.loading="lazy";
    img.onerror=function(){this.remove();};
    return img;
  }
  function topicFull(story){
    return (story.topics||[]).join(" · ") || story.topic || "";
  }
  function sourceNames(story){
    return (story.sources||[]).map(function(s){return s.name;}).filter(Boolean).join(", ");
  }
  function balanceCardSummaries(grid){
    requestAnimationFrame(function(){
      Array.prototype.forEach.call(grid.querySelectorAll(".news-card"), function(card){
        var headline = card.querySelector(".card-headline");
        var summary  = card.querySelector(".card-summary");
        if(!headline || !summary) return;
        var lineHeight = parseFloat(getComputedStyle(headline).lineHeight) || 18;
        var headlineLines = Math.max(1, Math.round(headline.offsetHeight / lineHeight));
        summary.style.webkitLineClamp = Math.max(2, 6 - headlineLines);
      });
    });
  }
  /* ── background ── */
  function applyBg(){
    var pb=ed.preview_bg||{};
    var theme=document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
    document.body.style.background=pb[theme]||"var(--lead-bg)";
  }
  applyBg();

  /* ── MODAL ── */
  function openModal(story){
    var hasImg = !!(story.image && story.image.url);

    var backdrop = el("div","modal-backdrop");
    var modal    = el("div","modal" + (hasImg?" modal-has-img":""));
    modal.setAttribute("role","dialog");
    modal.setAttribute("aria-modal","true");

    /* close button */
    var closeBtn = el("button","modal-close","×");
    closeBtn.setAttribute("aria-label","Close");
    modal.appendChild(closeBtn);

    /* image */
    if(hasImg){
      modal.appendChild(makeImg(story.image.url, story.image.alt||story.headline, "modal-img"));
    }

    /* body */
    var body = el("div","modal-body");

    var topicEl = el("p","modal-topic");
    topicEl.textContent = topicFull(story);
    if(story.label) topicEl.appendChild(el("span",null," · "+story.label));
    body.appendChild(topicEl);

    body.appendChild(el("h2","modal-headline", story.headline));
    if(story.summary) body.appendChild(el("p","modal-summary", story.summary));

    /* footer: sources + readtime */
    var footer = el("div","modal-footer");
    var srcs   = el("span","modal-sources");
    (story.sources||[]).forEach(function(src){
      if(!src.name) return;
      var a = el("a","source-link",src.name);
      a.href=src.url||"#"; a.target="_blank"; a.rel="noopener noreferrer";
      srcs.appendChild(a);
    });
    footer.appendChild(srcs);
    if(story.read_time) footer.appendChild(el("span","readtime",story.read_time));
    body.appendChild(footer);

    modal.appendChild(body);
    backdrop.appendChild(modal);
    document.body.appendChild(backdrop);
    document.body.style.overflow="hidden";

    function close(){
      backdrop.style.animation="backdropIn 0.12s ease reverse";
      modal.style.animation="modalIn 0.12s ease reverse";
      setTimeout(function(){
        backdrop.remove();
        document.body.style.overflow="";
      }, 110);
      document.removeEventListener("keydown",onKey);
    }
    function onKey(e){ if(e.key==="Escape") close(); }

    closeBtn.addEventListener("click", close);
    backdrop.addEventListener("click", function(e){ if(e.target===backdrop) close(); });
    document.addEventListener("keydown", onKey);

    /* focus trap: focus modal */
    setTimeout(function(){ closeBtn.focus(); }, 50);
  }

  /* ── render ── */
  var main = document.getElementById("main");

  if(!stories.length){
    var empty=el("div","empty");
    empty.innerHTML='<p class="empty-hed">Nothing today</p><p>No stories matched your topics.</p>';
    main.appendChild(empty);
  }

  /* LEAD (story 0) */
  if(stories.length){
    var lead    = stories[0];
    var leadEl  = el("div","lead-card");

    var imgUrl = lead.image&&lead.image.url;
    if(imgUrl){
      var leadImg = makeImg(imgUrl, lead.image.alt||lead.headline, "lead-img");
      leadImg.onerror = function(){ this.replaceWith(el("div","img-placeholder","No image")); };
      leadEl.appendChild(leadImg);
    } else {
      leadEl.appendChild(el("div","img-placeholder","No image"));
    }

    var leadBody = el("div","lead-body");
    var leadMeta = el("p","lead-meta");
    leadMeta.appendChild(el("span",null,"Lead story"));
    if(lead.read_time) leadMeta.appendChild(el("span","lead-readtime",lead.read_time));
    leadBody.appendChild(leadMeta);
    leadBody.appendChild(el("p","lead-headline", lead.headline));
    if(lead.summary){
      leadBody.appendChild(el("p","lead-teaser", lead.summary));
    }
    if((lead.sources||[]).length){
      var leadSources = el("p","lead-sources");
      (lead.sources||[]).forEach(function(src, i){
        if(!src.name) return;
        if(i) leadSources.appendChild(document.createTextNode(", "));
        var a = el("a","lead-source-link",src.name);
        a.href=src.url||"#"; a.target="_blank"; a.rel="noopener noreferrer";
        leadSources.appendChild(a);
      });
      if(leadSources.childNodes.length) leadBody.appendChild(leadSources);
    }

    leadEl.appendChild(leadBody);
    main.appendChild(leadEl);
  }

  /* CARD GRID (stories 1+) */
  if(stories.length>1){
    /* section header */
    var gHdr = el("div","grid-hdr");
    gHdr.appendChild(el("span","grid-hdr-label","More stories"));
    gHdr.appendChild(el("span","grid-hdr-line"));
    gHdr.appendChild(el("span","grid-hdr-count",(stories.length-1)+" stories"));
    main.appendChild(gHdr);

    var grid = el("div","card-grid");
    stories.slice(1).forEach(function(story){
      var imgUrl = story.image && story.image.url;
      var card = el("div", "news-card");
      card.setAttribute("role","button");
      card.setAttribute("tabindex","0");
      card.setAttribute("aria-label","Read: "+story.headline);

      if(imgUrl){
        var img = makeImg(imgUrl, story.image.alt||story.headline, "card-img");
        img.onerror = function(){ this.replaceWith(el("div","img-placeholder","No image")); };
        card.appendChild(img);
      } else {
        card.appendChild(el("div","img-placeholder","No image"));
      }

      var text = el("div","card-text");
      text.appendChild(el("p","card-headline", story.headline));
      if(story.summary) text.appendChild(el("p","card-summary", story.summary));
      card.appendChild(text);

      card.addEventListener("click", function(){ openModal(story); });
      card.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" ") openModal(story); });
      grid.appendChild(card);
    });
    main.appendChild(grid);
    balanceCardSummaries(grid);
    window.addEventListener("resize", function(){ balanceCardSummaries(grid); });
  }

  /* ── EXTRAS ── */
  function appendExtraSection(parent,title,items,type,moreUrl){
    var section=el("section","extras-section");
    var header=el("div","extras-section-hdr");
    header.appendChild(el("p","extras-kicker",title));
    if(moreUrl){
      var more=el("a","extras-more","More");
      more.href=moreUrl; more.target="_blank"; more.rel="noopener noreferrer";
      header.appendChild(more);
    }
    section.appendChild(header);

    var grid=el("div","extras-grid");
    (items||[]).forEach(function(item){
      var card=el("a","extra-card");
      card.href=item.url||"#"; card.target="_blank"; card.rel="noopener noreferrer";
      if(item.image_url) card.appendChild(makeImg(item.image_url,item.name||"","extra-img"));
      var body=el("div","extra-body");
      body.appendChild(el("span","extra-link","#"+item.rank+" "+item.name));
      var desc=item.tagline||item.description;
      if(desc) body.appendChild(el("p","extra-desc",desc));
      var meta=type==="product"
        ?((item.votes_count||0)+" votes"+(item.comments_count?" · "+item.comments_count+" comments":""))
        :([item.language,item.stars_today].filter(Boolean).join(" · "));
      if(meta) body.appendChild(el("p","extra-meta",meta));
      card.appendChild(body);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    parent.appendChild(section);
  }

  var extrasEl = document.getElementById("extras");
  var products = extras.product_hunt   ||[];
  var repos    = extras.github_trending||[];
  if(products.length||repos.length){
    extrasEl.appendChild(el("h2","extras-title","Extras"));
    if(products.length) appendExtraSection(extrasEl,"Product Hunt Yesterday Top 5",products,"product",extras.product_hunt_more_url);
    if(repos.length)    appendExtraSection(extrasEl,"GitHub Trending Top 3",repos,"repo",extras.github_trending_more_url||"https://github.com/trending");
  } else { extrasEl.remove(); }

  /* ── theme ── */
  var btn=document.getElementById("theme-btn");
  function getTheme(){
    return document.documentElement.dataset.theme||
      (window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  }
  function applyTheme(t){
    document.documentElement.dataset.theme=t;
    btn.textContent=t==="dark"?"Light":"Dark";
    try{localStorage.setItem("nl-theme",t);}catch(e){}
    applyBg();
  }
  applyTheme(getTheme());
  btn.addEventListener("click",function(){applyTheme(getTheme()==="dark"?"light":"dark");});
}());
</script>
</body>
</html>
