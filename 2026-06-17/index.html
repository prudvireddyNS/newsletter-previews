<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script>

  <style>
    :root {
      --bg:       #F8F7F4;
      --surface:  #F8F7F4;
      --lead-bg:  #EDEDFF;
      --ink:      #131311;
      --ink2:     #3D3D3B;
      --ink3:     #8A8782;
      --accent:   #4B6BFB;
      --border:   #E0DED8;
      --tag-bg:   #EAECFF;
      --tag-txt:  #3B5BDB;
      --shadow:   0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
      --serif:    'Merriweather', Georgia, serif;
      --sans:     'Inter', system-ui, -apple-system, sans-serif;
    }
    [data-theme="dark"] {
      --bg:       #0E0D0C;
      --surface:  #1A1917;
      --lead-bg:  #10112A;
      --ink:      #EDEAE0;
      --ink2:     #C4C1BC;
      --ink3:     #6A6864;
      --accent:   #8097FF;
      --border:   #232220;
      --tag-bg:   #141628;
      --tag-txt:  #99AAFF;
      --shadow:   0 1px 3px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    ::selection { background: var(--accent); color: #fff; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    body {
      background: var(--lead-bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    /* ── wrap ── */
    .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 28px 96px; }
    .content-grid {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      align-items: start;
      gap: 32px;
    }
    .news-col { min-width: 0; }

    /* ── masthead ── */
    .mast {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 48px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .mast-left { min-width: 0; }
    .mast-kicker {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
    }
    .mast-kicker-accent { color: var(--accent); font-weight: 600; }
    .mast-title {
      font-family: var(--serif);
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      background: var(--tag-bg);
      color: var(--tag-txt);
      border-radius: 4px;
      padding: 3px 9px;
    }
    .connections {
      max-width: 760px;
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.75;
      color: var(--ink2);
      border-left: 3px solid var(--accent);
      padding-left: 14px;
      margin-top: 16px;
    }
    .pov {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--ink2);
      background: var(--lead-bg);
      border-radius: 8px;
      padding: 10px 12px;
      margin: 0 0 14px 0;
    }
    .pov strong { color: var(--ink); }
    .mast-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
      padding-top: 4px;
    }
    .theme-btn {
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--ink2);
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.1s, border-color 0.1s;
    }
    .theme-btn:hover { color: var(--ink); border-color: var(--ink3); }
    .mast-sub {
      font-size: 11px;
      color: var(--ink3);
      text-align: right;
    }

    /* ── LEAD STORY ── */
    .lead {
      background: var(--surface);
      border-radius: 16px;
      padding: 28px 32px 26px;
      margin-bottom: 36px;
      box-shadow: var(--shadow);
    }
    .lead-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .lead-label {
      color: var(--ink3);
      font-weight: 500;
    }
    .lead-img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      margin-bottom: 18px;
    }
    .lead-headline {
      font-family: var(--serif);
      font-size: clamp(24px, 3.6vw, 42px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 14px;
    }
    .lead-summary {
      font-family: var(--serif);
      font-size: 16px;
      line-height: 1.8;
      color: var(--ink2);
      margin-bottom: 18px;
      font-weight: 400;
    }
    .lead-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .story-sources { display: flex; gap: 12px; flex-wrap: wrap; }
    .source-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }
    .source-link::after { content: " ↗"; opacity: 0.6; font-size: 10px; }
    .source-link:hover { text-decoration: underline; }
    .readtime {
      font-size: 11px;
      color: var(--ink3);
      white-space: nowrap;
    }

    /* ── SEC GRID (stories 2-3) ── */
    .sec-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .sec-col {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px;
      box-shadow: var(--shadow);
    }
    .sec-grid {
      gap: 16px;
    }
    .sec-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
    }
    .sec-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin-bottom: 14px;
    }
    .sec-headline {
      font-family: var(--serif);
      font-size: clamp(18px, 2.2vw, 24px);
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 10px;
    }
    .sec-summary {
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--ink2);
      margin-bottom: 14px;
    }
    .sec-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── STRIPS (stories 4+) ── */
    .strip {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      padding: 28px;
      background: var(--surface);
      border-radius: 14px;
      margin-top: 20px;
      box-shadow: var(--shadow);
    }
    .strip-text { flex: 1; min-width: 0; }
    .strip-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 8px;
    }
    .strip-headline {
      font-family: var(--serif);
      font-size: clamp(16px, 2vw, 20px);
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .strip-summary {
      font-size: 14.5px;
      line-height: 1.7;
      color: var(--ink2);
      margin-bottom: 10px;
    }
    .strip-img {
      width: 150px;
      height: 110px;
      object-fit: cover;
      border-radius: 7px;
      flex-shrink: 0;
      display: block;
    }

    /* ── empty ── */
    .empty {
      padding: 80px 0;
      text-align: center;
      color: var(--ink3);
    }
    .empty-hed {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 700;
      color: var(--ink2);
      margin-bottom: 8px;
    }

    .extras {
      min-width: 0;
    }
    .extras-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .extras-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .extras-section + .extras-section { margin-top: 24px; }
    .extra-card {
      background: var(--surface);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: var(--shadow);
    }
    .extras-kicker {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
    }
    .extra-body { min-width: 0; }
    .extra-link {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.25;
      text-decoration: none;
      font-weight: 600;
    }
    .extra-link:hover { text-decoration: underline; }
    .extra-img {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 9px;
      display: block;
      background: var(--lead-bg);
      flex-shrink: 0;
    }
    .extra-desc {
      color: var(--ink2);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 4px;
    }
    .extra-meta {
      color: var(--ink3);
      font-size: 11px;
      margin-top: 4px;
    }

    @media (max-width: 960px) {
      .wrap { max-width: 800px; }
      .content-grid { grid-template-columns: 1fr; }
      .extras { order: 2; margin-top: 32px; }
      .news-col { order: 1; }
      .extras-grid { grid-template-columns: 1fr 1fr; gap: 16px; }
    }

    @media (max-width: 560px) {
      .wrap { padding: 28px 16px 64px; }
      .lead { padding: 24px 22px 22px; }
      .sec-grid { grid-template-columns: 1fr; }
      .extras-grid { grid-template-columns: 1fr; }
      .mast { flex-direction: column; gap: 12px; }
      .mast-right { flex-direction: row; align-items: center; }
      .mast-sub { text-align: left; }
      .strip-img { width: 100px; height: 72px; }
    }

    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>

, "pov": "I'm intrigued but not convinced until we see latency, permissioning, and failure recovery; voice demos are easy to overrate and my tooling bias makes me focus on the MCP plumbing.", "sources": [{"name": "X", "url": "https://x.com/gdb/status/2067100786098831681", "topic": "Multimodal AI"}, {"name": "X", "url": "https://x.com/per_simmons_/status/2067051453022363992", "topic": "LLM OS / MCP Ecosystem"}], "image": {"url": "", "alt": ""}, "label": null, "read_time": null, "topics": ["Multimodal AI", "LLM OS / MCP Ecosystem"], "topic": "Multimodal AI"}, {"number": "07", "headline": "AI Tooling Security Debt Is Showing", "summary": "TheHackerNews reports a Google Vertex AI SDK issue where attackers could hijack model uploads via bucket squatting, and Ars says a critical Copilot vulnerability let attackers steal 2FA codes. These are exactly the failure modes I worry about as agents get delegated credentials, storage, browser state, and repo permissions.", "pov": "This is underappreciated: agent adoption will be throttled less by model quality than by whether AI SDKs and copilots can survive basic cloud and identity threat models.", "sources": [{"name": "TheHackerNews", "url": "https://thehackernews.com/2026/06/google-vertex-ai-sdk-flaw-let-attackers.html", "topic": "AI LLM Tooling"}, {"name": "Ars Technica", "url": "https://arstechnica.com/security/2026/06/critical-copilot-vulnerability-allowed-hackers-to-seal-2fa-code-from-users/", "topic": "AI Coding Tools"}], "image": {"url": "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgpiAGZTnvo43enaVYkna4ZSp217mwwW5kW8kZOhaSiLAxicjvHQY-3d8rdLN47bsRvxUIj6R0h_Ttr8NcIJrgz6k_mbcx94KLuPD29KdhFcYQsrV8htgg_iDYMV9aXbr21kv6BdYTzLNOOqQLpsCfpDC4XxDPnu77uVQ3oCYbIUfIpUKdmqx-rZZWj6P0/s1600/Google-Vertex-AI.jpg", "alt": "Google Vertex AI security illustration"}, "label": null, "read_time": null, "topics": ["AI LLM Tooling", "AI Coding Tools"], "topic": "AI LLM Tooling"}, {"number": "08", "headline": "Qwen Pushes Agents Into Embodied Models", "summary": "Alibaba's Qwen team introduced Qwen-RobotNav, Qwen-RobotManip, and Qwen-RobotWorld: navigation across five task types, manipulation with a unified state-action space trained on 38,100+ hours of open-source data, and a world model spanning 20+ embodiments. I do not build robots day to day, but the tool interfaces and natural-language action layer are clearly converging with software-agent architecture.", "pov": "I'm cautiously interested, not hyped: robotics demos hide a lot of integration pain, but Qwen packaging embodied capabilities as composable agent tools is the right abstraction.", "sources": [{"name": "X", "url": "https://x.com/Alibaba_Qwen/status/2066870197122899980", "topic": "AI Agents & Agentic Frameworks"}], "image": {"url": "https://pbs.twimg.com/media/HK73q7UbUAAYGBF.jpg", "alt": "Qwen-Robot Suite model overview graphic"}, "label": null, "read_time": null, "topics": ["AI Agents & Agentic Frameworks"], "topic": "AI Agents & Agentic Frameworks"}], "extras": {"product_hunt": [{"rank": 1, "name": "Goldfish", "tagline": "Press Option. It knows your work and replies like you", "url": "https://www.producthunt.com/products/goldfish-early-access?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 547, "comments_count": 182, "image_url": "https://ph-files.imgix.net/c42a4d06-2035-4c13-b95d-02f34f14ba7c.png?auto=format"}, {"rank": 2, "name": "Invoko", "tagline": "A little hand on your Mac", "url": "https://www.producthunt.com/products/invoko?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 400, "comments_count": 90, "image_url": "https://ph-files.imgix.net/40e88728-ef87-4f3e-930f-c3d1c184ef89.svg?auto=format"}, {"rank": 3, "name": "MakersClaw", "tagline": "Hire AI employees that live in your Slack, Teams, Telegram", "url": "https://www.producthunt.com/products/makersclaw?utm_campaign=producthunt-api&utm_medium=api-v2&utm_source=Application%3A+my+news+%28ID%3A+287926%29", "votes_count": 367, "comments_count": 47, "image_url": "https://ph-files.imgix.net/9e1bef12-7d7a-4f2b-8931-71f4ac94bbc5.png?auto=format"}], "github_trending": [{"rank": 1, "name": "freeCodeCamp/freeCodeCamp", "description": "freeCodeCamp.org's open-source codebase and curriculum. Learn math, programming, and computer science for free.", "url": "https://github.com/freeCodeCamp/freeCodeCamp", "image_url": "https://opengraph.githubassets.com/1/freeCodeCamp/freeCodeCamp", "language": "TypeScript", "stars": "448,780", "stars_today": "633 stars today"}, {"rank": 2, "name": "swc-project/swc", "description": "Rust-based platform for the Web", "url": "https://github.com/swc-project/swc", "image_url": "https://opengraph.githubassets.com/1/swc-project/swc", "language": "Rust", "stars": "34,012", "stars_today": "20 stars today"}, {"rank": 3, "name": "teslamate-org/teslamate", "description": "A self-hosted data logger for your Tesla 🚘 [main maintainer=@JakobLichterfeld]", "url": "https://github.com/teslamate-org/teslamate", "image_url": "https://opengraph.githubassets.com/1/teslamate-org/teslamate", "language": "Elixir", "stars": "8,445", "stars_today": "215 stars today"}]}, "preview_bg": {"light": "#E8F4FF", "dark": "#0A1E2C"}}</script>
<script>
(function () {
  var ed = JSON.parse(document.getElementById("ed").textContent);
  var stories = ed.stories || [];
  var extras = ed.extras || {};

  /* masthead */
  var kickerEl = document.getElementById("mast-kicker");
  if (ed.persona) {
    kickerEl.innerHTML = (ed.date || "") + ' &middot; <span class="mast-kicker-accent">' + ed.persona + '</span>';
  } else {
    kickerEl.textContent = ed.date || "";
  }
  document.getElementById("mast-title").textContent = ed.issue_title || (stories.length + " stories");
  var subEl = document.getElementById("mast-sub");
  subEl.textContent = ed.email || "";

  var tagsEl = document.getElementById("tags");
  (ed.tags || []).forEach(function (t) {
    var s = document.createElement("span");
    s.className = "tag"; s.textContent = t;
    tagsEl.appendChild(s);
  });
  var connectionsEl = document.getElementById("connections");
  if (ed.connections) {
    connectionsEl.textContent = ed.connections;
    connectionsEl.hidden = false;
  }

  /* helpers */
  function el(tag, cls, text) {
    var n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }
  function makeImg(url, alt, cls) {
    var img = document.createElement("img");
    img.className = cls; img.src = url;
    img.alt = alt || ""; img.loading = "lazy";
    img.onerror = function () { this.remove(); };
    return img;
  }
  function makeSources(story, wrapCls) {
    var wrap = el("span", wrapCls || "story-sources");
    (story.sources || []).forEach(function (src) {
      if (!src.name) return;
      var a = el("a", "source-link", src.name);
      a.href = src.url || "#"; a.target = "_blank"; a.rel = "noopener noreferrer";
      wrap.appendChild(a);
    });
    return wrap;
  }
  function topicText(story) {
    return (story.topics || []).join(" · ") || story.topic || "";
  }
  function appendPov(parent, story) {
    if (!story.pov) return;
    var pov = el("p", "pov");
    pov.innerHTML = "<strong>POV:</strong> ";
    pov.appendChild(document.createTextNode(story.pov));
    parent.appendChild(pov);
  }

  var main = document.getElementById("main");

  function applyBg() {
    var previewBg = ed.preview_bg || {};
    var theme = document.documentElement.dataset.theme ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    document.body.style.background = previewBg[theme] || "var(--lead-bg)";
  }
  applyBg();

  if (!stories.length) {
    var empty = el("div", "empty");
    empty.innerHTML = '<p class="empty-hed">Nothing today</p><p>No stories matched your topics.</p>';
    main.appendChild(empty);
  }

  /* ── LEAD ── */
  if (stories.length) {
    var lead = stories[0];
    var leadEl = el("section", "lead");

    var eyebrow = el("p", "lead-eyebrow");
    eyebrow.appendChild(document.createTextNode(topicText(lead)));
    if (lead.label) eyebrow.appendChild(el("span", "lead-label", " · " + lead.label));
    leadEl.appendChild(eyebrow);

    var imgUrl = lead.image && lead.image.url;
    if (imgUrl) leadEl.appendChild(makeImg(imgUrl, lead.image.alt || lead.headline, "lead-img"));

    leadEl.appendChild(el("h2", "lead-headline", lead.headline));
    if (lead.summary) leadEl.appendChild(el("p", "lead-summary", lead.summary));
    appendPov(leadEl, lead);

    var leadFoot = el("div", "lead-footer");
    leadFoot.appendChild(makeSources(lead));
    if (lead.read_time) leadFoot.appendChild(el("span", "readtime", lead.read_time));
    leadEl.appendChild(leadFoot);
    main.appendChild(leadEl);
  }

  /* ── SEC GRID (stories 1 & 2) ── */
  var secStories = stories.slice(1, 3);
  if (secStories.length) {
    var grid = el("div", "sec-grid");
    secStories.forEach(function (story) {
      var col = el("article", "sec-col");
      col.appendChild(el("p", "sec-eyebrow", topicText(story)));
      var sImg = story.image && story.image.url;
      if (sImg) col.appendChild(makeImg(sImg, story.image.alt || story.headline, "sec-img"));
      col.appendChild(el("h3", "sec-headline", story.headline));
      if (story.summary) col.appendChild(el("p", "sec-summary", story.summary));
      appendPov(col, story);
      var foot = el("div", "sec-footer");
      foot.appendChild(makeSources(story));
      if (story.read_time) foot.appendChild(el("span", "readtime", story.read_time));
      col.appendChild(foot);
      grid.appendChild(col);
    });
    main.appendChild(grid);
  }

  /* ── STRIPS (stories 3+) ── */
  stories.slice(3).forEach(function (story) {
    var strip = el("article", "strip");
    var text = el("div", "strip-text");
    text.appendChild(el("p", "strip-eyebrow", topicText(story)));
    text.appendChild(el("h3", "strip-headline", story.headline));
    if (story.summary) text.appendChild(el("p", "strip-summary", story.summary));
    appendPov(text, story);
    var foot = el("div", "story-sources");
    foot.style.display = "flex"; foot.style.gap = "12px";
    foot.style.flexWrap = "wrap"; foot.style.alignItems = "center";
    foot.appendChild(makeSources(story));
    if (story.read_time) foot.appendChild(el("span", "readtime", story.read_time));
    text.appendChild(foot);
    strip.appendChild(text);
    var sImg = story.image && story.image.url;
    if (sImg) strip.appendChild(makeImg(sImg, story.image.alt || story.headline, "strip-img"));
    main.appendChild(strip);
  });

  /* ── extras ── */
  function appendExtraSection(parent, title, items, type) {
    var section = el("section", "extras-section");
    section.appendChild(el("p", "extras-kicker", title));
    var grid = el("div", "extras-grid");
    (items || []).forEach(function (item) {
      var card = el("article", "extra-card");
      if (item.image_url) card.appendChild(makeImg(item.image_url, item.name || "", "extra-img"));
      var body = el("div", "extra-body");
      var a = el("a", "extra-link", "#" + item.rank + " " + item.name);
      a.href = item.url || "#"; a.target = "_blank"; a.rel = "noopener noreferrer";
      body.appendChild(a);
      var desc = item.tagline || item.description;
      if (desc) body.appendChild(el("p", "extra-desc", desc));
      var meta = type === "product"
        ? ((item.votes_count || 0) + " votes" + (item.comments_count ? " · " + item.comments_count + " comments" : ""))
        : ([item.language, item.stars_today].filter(Boolean).join(" · "));
      if (meta) body.appendChild(el("p", "extra-meta", meta));
      card.appendChild(body);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    parent.appendChild(section);
  }
  var extrasEl = document.getElementById("extras");
  var products = extras.product_hunt || [];
  var repos = extras.github_trending || [];
  if (products.length || repos.length) {
    extrasEl.appendChild(el("h2", "extras-title", "Extras"));
    if (products.length) appendExtraSection(extrasEl, "Product Hunt Yesterday Top 3", products, "product");
    if (repos.length) appendExtraSection(extrasEl, "GitHub Trending Top 3", repos, "repo");
  } else {
    extrasEl.remove();
  }

  /* ── theme ── */
  var btn = document.getElementById("theme-btn");
  function getTheme() {
    return document.documentElement.dataset.theme ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  }
  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    btn.textContent = t === "dark" ? "Light" : "Dark";
    try { localStorage.setItem("nl-theme", t); } catch(e) {}
    applyBg();
  }
  applyTheme(getTheme());
  btn.addEventListener("click", function () { applyTheme(getTheme() === "dark" ? "light" : "dark"); });
}());
</script>
</body>
</html>
